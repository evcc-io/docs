template: homeassistant
product:
  identifier: home-assistant
  brand: Home Assistant
render:
  - default: |
      type: template
      template: homeassistant
      uri: http://homeassistant.local:8123 # Home Assistant URI
      notify: notify.mobile_app_android # Notify service, Home Assistant notify service in the form `domain.service` (e.g. `notify.mobile_app_android`). Leave empty to create a persistent notification in the HA UI. (optional)
      critical: false # Critical notification, Sets ttl=0 and priority=high for immediate delivery even in battery saver mode. (optional)
      group: evcc # Notification group, Groups notifications on the device. Same group collapses multiple alerts together. (optional)
      notification_channel: alarm_stream # Notification channel, Android notification channel (controls sound and importance). E.g. `alarm_stream` for alarm sound. (optional)
params:
  - name: uri
    example: http://homeassistant.local:8123
    default:
    choice: []
    unit:
    description: Home Assistant URI
    help:
    advanced: false
    optional: false
  - name: notify
    example: notify.mobile_app_android
    default:
    choice: []
    unit:
    description: Notify service
    help: Home Assistant notify service in the form `domain.service` (e.g. `notify.mobile_app_android`). Leave empty to create a persistent notification in the HA UI.
    advanced: false
    optional: true
  - name: critical
    example:
    default: false
    choice: []
    unit:
    description: Critical notification
    help: Sets ttl=0 and priority=high for immediate delivery even in battery saver mode.
    advanced: false
    optional: true
  - name: group
    example: evcc
    default:
    choice: []
    unit:
    description: Notification group
    help: Groups notifications on the device. Same group collapses multiple alerts together.
    advanced: false
    optional: true
  - name: notification_channel
    example: alarm_stream
    default:
    choice: []
    unit:
    description: Notification channel
    help: Android notification channel (controls sound and importance). E.g. `alarm_stream` for alarm sound.
    advanced: false
    optional: true