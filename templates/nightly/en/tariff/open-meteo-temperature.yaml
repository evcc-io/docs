template: open-meteo-temperature
product:
  identifier: open-meteo-temperature
  brand: Open-Meteo Temperature
  group: Temperature forecast
requirements: ["skiptest"]
description: |
  Free Weather API [open-meteo.com](https://open-meteo.com) for outdoor temperature data in 15-minute intervals. Open-Meteo is an open-source weather API and offers free access for non-commercial use. No API key required.
render:
  - default: |
      type: template
      template: open-meteo-temperature
      lat: 55.7351 # Latitude
      lon: 9.1275 # Longitude
    advanced: |
      type: template
      template: open-meteo-temperature
      lat: 55.7351 # Latitude
      lon: 9.1275 # Longitude
      interval: 1h # Interval, optional
params:
  - name: lat
    example: 55.7351
    default:
    choice: []
    unit:
    description: Latitude
    help:
    advanced: false
    optional: false
  - name: lon
    example: 9.1275
    default:
    choice: []
    unit:
    description: Longitude
    help:
    advanced: false
    optional: false
  - name: interval
    example:
    default: 1h
    choice: []
    unit:
    description: Interval
    help:
    advanced: true
    optional: true