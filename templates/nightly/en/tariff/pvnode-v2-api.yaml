template: pvnode-v2
product:
  identifier: pvnode-v2-api
  brand: pvnode V2 API
  group: PV forecast
requirements: ["skiptest"]
description: |
  [pvnode V2 API](https://pvnode.com) provides 15-minute PV production forecasts via REST API Version 2 with site ID and easy configuration via web app.
  An API key is required (free plan available).
  **Attention**: The free plan only allows one fixed site with forecasts for today & tomorrow and only one update per day and 250 cached queries.

render:
  - default: |
      type: template
      template: pvnode-v2
      site_id: # Site ID
      apikey: # pvnode API key
    advanced: |
      type: template
      template: pvnode-v2
      site_id: # Site ID
      apikey: # pvnode API key
      forecast_days: 1 # Forecast days, The free plan of pvnode only allows 1 forecast day (1 = today + tomorrow). (optional)
params:
  - name: site_id
    example:
    default:
    choice: []
    unit:
    description: Site ID
    help:
    advanced: false
    optional: false
  - name: apikey
    example:
    default:
    choice: []
    unit:
    description: pvnode API key
    help:
    advanced: false
    optional: false
  - name: forecast_days
    example:
    default: 1
    choice: []
    unit:
    description: Forecast days
    help: The free plan of pvnode only allows 1 forecast day (1 = today + tomorrow).
    advanced: true
    optional: true