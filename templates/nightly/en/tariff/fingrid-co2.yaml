template: fingrid-co2
product:
  identifier: fingrid-co2
  brand: Fingrid
  description: CO₂
  group: CO₂ forecast
countries: ["FI"]
requirements: ["skiptest"]
description: |
  CO₂ data for Finnish national grid from [Fingrid OpenData](https://www.fingrid.fi/en/electricity-market-information/real-time-co2-emissions-estimate/). Get your API key by registering an account at [https://data.fingrid.fi/instructions](https://data.fingrid.fi/instructions).
render:
  - default: |
      type: template
      template: fingrid-co2
      apiKey: # API Key, Get your API key by registering an account at [https://data.fingrid.fi/instructions](https://data.fingrid.fi/instructions), creating a new API key and enter it here.
    advanced: |
      type: template
      template: fingrid-co2
      apiKey: # API Key, Get your API key by registering an account at [https://data.fingrid.fi/instructions](https://data.fingrid.fi/instructions), creating a new API key and enter it here.
      charges: # Charge, Additional fixed charge per kWh (optional)
      chargesZones: # Charges zones, Time-based grid fees that override the default charge. (optional)
      tax: # Tax, Additional percentage charge (e.g. 0.2 for 20%) (optional)
      formula: math.Max((price + charges) * (1 + tax), 0.0) # Formula, Individual formula for calculating the price (optional)
params:
  - name: apiKey
    example:
    default:
    choice: []
    unit:
    description: API Key
    help: Get your API key by registering an account at [https://data.fingrid.fi/instructions](https://data.fingrid.fi/instructions), creating a new API key and enter it here.
    advanced: false
    optional: false
  - name: charges
    example:
    default:
    choice: []
    unit:
    description: Charge
    help: Additional fixed charge per kWh
    advanced: true
    optional: true
  - name: chargesZones
    example:
    default:
    choice: []
    unit:
    description: Charges zones
    help: Time-based grid fees that override the default charge.
    advanced: true
    optional: true
  - name: tax
    example:
    default:
    choice: []
    unit:
    description: Tax
    help: Additional percentage charge (e.g. 0.2 for 20%)
    advanced: true
    optional: true
  - name: formula
    example: math.Max((price + charges) * (1 + tax), 0.0)
    default:
    choice: []
    unit:
    description: Formula
    help: Individual formula for calculating the price
    advanced: true
    optional: true