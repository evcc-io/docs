    default:
    choice: []
    unit: W
    description: Max. consumption power (grid connection)
    help: Contractual maximum power of the grid connection point reported to the control box. This is the connection capacity agreed with the grid operator, NOT the minimum consumption power (Pmin) of the control box. Default 24.15 kVA (3x35A).
    advanced: true
    optional: true
  - name: failsafeconsumptionpower
    example:
    default:
    choice: []
    unit: W
    description: Failsafe consumption limit (Pmin, LPC)
    help: Failsafe minimum consumption power (Pmin) for controllable loads applied when the heartbeat from the control box is lost; it is overwritten by the control box once it transmits its own failsafe values. (Default 4.2 kW)
    advanced: true
    optional: true
  - name: productionnominalmax
    example:
    default:
    choice: []
    unit: W
    description: Installed generator power (Wp)
    help: Rated generator/module power (Wp) of the installation.
    advanced: true
