template: hemspro-eebus
product:
  identifier: awatt-electronic-hems-pro-eebus
  brand: Awatt Electronic
  description: HEMS PRO (EEBus)
render:
  - default: |
      type: template
      template: hemspro-eebus
      ski: # Subject Key Identifier (SKI), SKI of the FNN control box (shown in its web interface)
      ip: 192.0.2.2 # IP address, optional
    advanced: |
      type: template
      template: hemspro-eebus
      ski: # Subject Key Identifier (SKI), SKI of the FNN control box (shown in its web interface)
      ip: 192.0.2.2 # IP address, optional
      consumptionnominalmax: # Max. consumption power (grid connection) (W), Contractual maximum power of the grid connection point reported to the control box. This is the connection capacity agreed with the grid operator, NOT the minimum consumption power (Pmin) of the control box. Default 24.15 kVA (3x35A). (optional)
      failsafeconsumptionpower: # Failsafe consumption limit (Pmin, LPC) (W), Failsafe minimum consumption power (Pmin) for controllable loads applied when the heartbeat from the control box is lost; it is overwritten by the control box once it transmits its own failsafe values. (Default 4.2 kW) (optional)
      productionnominalmax: # Installed generator power (Wp) (W), Rated generator/module power (Wp) of the installation. (optional)
      failsafeproductionpower: # Failsafe production limit (LPP) (W), Remaining maximum feed-in power applied when the heartbeat from the control box is lost. Initial value; it is overwritten by the control box once it transmits its own failsafe values. (optional)
      failsafeduration: # Failsafe minimum duration, Minimum time the failsafe limit stays active once entered. Initial value (default 2h); the control box overwrites it once it transmits its own value. (optional)
params:
  - name: ski
    example:
    default:
    choice: []
    unit:
    description: Subject Key Identifier (SKI)
    help: SKI of the FNN control box (shown in its web interface)
    advanced: false
