template: abl-em4
product:
  identifier: abl-em4-single-sbcx
  brand: ABL
  description: eM4 Single (SBCx)
capabilities: ["mA"]
requirements: ["sponsorship"]
render:
  - default: |
      type: template
      template: abl-em4

      # Modbus TCP
      modbus: tcpip
      id: 255
      host:  # Hostname
      port: 502 # Port
    advanced: |
      type: template
      template: abl-em4

      # Modbus TCP
      modbus: tcpip
      id: 255
      host:  # Hostname
      port: 502 # Port
      connector: 1 # Connector number, For multi-connector stations. Numbering starts at 1. (optional)
params:
  - name: modbus
    example:
    default:
    choice: ['tcpip']
    unit:
    description: Modbus Type
    help:
    advanced: false
    optional: false
  - name: connector
    example:
    default: 1
    choice: []
    unit:
    description: Connector number
    help: For multi-connector stations. Numbering starts at 1.
    advanced: true
    optional: true
modbus:
  host:
  id: 255
  modbus: tcpip
  port: 502
  tcpip: true