template: phoenix-ev-eth
product:
  identifier: wallbe-pro
  brand: Wallbe
  description: Pro
capabilities: ["mA", "rfid", "dim"]
requirements: ["sponsorship"]
description: |
  DIP switch 10 at the controller needs to be set to 'ON'. A recent controller firmware is recommended.
render:
  - default: |
      type: template
      template: phoenix-ev-eth

      # Modbus TCP
      modbus: tcpip
      id: 255
      host:  # Hostname
      port: 502 # Port
    advanced: |
      type: template
      template: phoenix-ev-eth

      # Modbus TCP
      modbus: tcpip
      id: 255
      host:  # Hostname
      port: 502 # Port
      millicurrentsupported: false # mA regulation supported, Forces mA regulation of the extended Wallbe firmware in case autodetection fails. (optional)
params:
  - name: modbus
    example:
    default:
    choice: ['tcpip']
    unit:
    description: Modbus Type
    help:
    advanced: false
    optional: false
  - name: millicurrentsupported
    example:
    default: false
    choice: []
    unit:
    description: mA regulation supported
    help: Forces mA regulation of the extended Wallbe firmware in case autodetection fails.
    advanced: true
    optional: true
modbus:
  host:
  id: 255
  modbus: tcpip
  port: 502
  tcpip: true