template: solvis
product:
  identifier: solvis-solviscontrol-2-3
  brand: Solvis
  description: SolvisControl 2/3
  group: Heating devices
capabilities: ["meter"]
description: |
  Modbus TCP must be enabled at the SolvisControl under "Settings / Network".
  Control is done via the hot water target temperature.
  The controller does not support power reduction (dim).

render:
  - default: |
      type: template
      template: solvis
      host: 192.0.2.2 # IP address or hostname
      tempsource: warmwater # Temperature source, [warmwater, buffer]
      port: 502 # Port, optional
      tempnormal: 48 # Target temperature normal mode, optional
      tempboost: 60 # Target temperature boost, optional
params:
  - name: host
    example: 192.0.2.2
    default:
    choice: []
    unit:
    description: IP address or hostname
    help:
    advanced: false
    optional: false
  - name: tempsource
    example:
    default: warmwater
    choice: ['warmwater', 'buffer']
    unit:
    description: Temperature source
    help:
    advanced: false
    optional: false
  - name: port
    example:
    default: 502
    choice: []
    unit:
    description: Port
    help:
    advanced: false
    optional: true
  - name: tempnormal
    example:
    default: 48
    choice: []
    unit:
    description: Target temperature normal mode
    help:
    advanced: false
    optional: true
  - name: tempboost
    example:
    default: 60
    choice: []
    unit:
    description: Target temperature boost
    help:
    advanced: false
    optional: true