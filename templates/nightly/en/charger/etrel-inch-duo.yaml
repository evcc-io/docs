template: etrel-duo
product:
  identifier: etrel-inch-duo
  brand: Etrel
  description: INCH Duo
capabilities: ["mA"]
requirements: ["sponsorship"]
description: |
  The charger must be switched to "Power" charging mode.
render:
  - default: |
      type: template
      template: etrel-duo
      host: 192.0.2.2 # IP address or hostname
      port: 502 # Port, optional
    advanced: |
      type: template
      template: etrel-duo
      host: 192.0.2.2 # IP address or hostname
      port: 502 # Port, optional
      connector: 1 # Connector number, For multi-connector stations. Numbering starts at 1. (optional)
params:
  - name: host
    example: 192.0.2.2
    default:
    choice: []
    unit:
    description: IP address or hostname
    help:
    advanced: false
    optional: false
  - name: port
    example:
    default: 502
    choice: []
    unit:
    description: Port
    help:
    advanced: false
    optional: true
  - name: connector
    example:
    default: 1
    choice: []
    unit:
    description: Connector number
    help: For multi-connector stations. Numbering starts at 1.
    advanced: true
    optional: true