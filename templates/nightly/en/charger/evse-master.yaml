template: evsemaster-udp
product:
  identifier: evse-master
  brand: EVSE Master
capabilities: ["meter", "dim"]
requirements: ["sponsorship", "skiptest"]
description: |
  The charger and evcc must be on the same network segment (VLAN). Discovery relies on UDP broadcast, which most routers do not forward across VLANs.

render:
  - default: |
      type: template
      template: evsemaster-udp
      serial: '0906252400004617' # Serial number (16-character hex string), Found on the device label. Enter as a 16-character hex string (8 bytes).
      password: # Password (set in the EVSE Master app), Set in the EVSE Master app under device settings. The app and evcc must not be connected at the same time.
params:
  - name: serial
    example: '0906252400004617'
    default:
    choice: []
    unit:
    description: Serial number (16-character hex string)
    help: Found on the device label. Enter as a 16-character hex string (8 bytes).
    advanced: false
    optional: false
  - name: password
    example:
    default:
    choice: []
    unit:
    description: Password (set in the EVSE Master app)
    help: Set in the EVSE Master app under device settings. The app and evcc must not be connected at the same time.
    advanced: false
    optional: false