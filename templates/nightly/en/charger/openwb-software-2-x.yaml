template: openwb-2.0
product:
  identifier: openwb-software-2-x
  brand: openWB
  description: Software 2.x
capabilities: ["mA", "1p3p", "meter", "dim"]
description: |
  Requires [`Software 2.x`](https://github.com/openWB/core).
  The following changes are necessary under the 'Einstellungen' tab:

  * Steuerungsmodus: `secondary`
  * Steuerung über Modbus als secondary: `An`

  RFID-Authorisation currently is not usable with openWB Software 2.x, check
  [`openWB Issue 2832`](https://github.com/openWB/core/issues/2832)

render:
  - default: |
      type: template
      template: openwb-2.0

      # Modbus TCP
      modbus: tcpip
      id: 1
      host:  # Hostname
      port: 1502 # Port
    advanced: |
      type: template
      template: openwb-2.0

      # Modbus TCP
      modbus: tcpip
      id: 1
      host:  # Hostname
      port: 1502 # Port
      connector: 1 # Connector number, For multi-connector stations. Numbering starts at 1. (optional)
      phases1p3p: true # Charger is equipped with phase switching feature, optional
      identify: # Use RFID-Reader, Be sure to check [`openWB Issue 2832`](https://github.com/openWB/core/issues/2832) before enabling this, should not be used for access protection! (optional)
params:
  - name: modbus
    example:
    default:
    choice: ['tcpip']
    unit:
    description: Modbus Type
    help:
    advanced: false
    optional: false
  - name: connector
    example:
    default: 1
    choice: []
    unit:
    description: Connector number
    help: For multi-connector stations. Numbering starts at 1.
    advanced: true
    optional: true
  - name: phases1p3p
    example:
    default: true
    choice: []
    unit:
    description: Charger is equipped with phase switching feature
    help:
    advanced: true
    optional: true
  - name: identify
    example:
    default:
    choice: []
    unit:
    description: Use RFID-Reader
    help: Be sure to check [`openWB Issue 2832`](https://github.com/openWB/core/issues/2832) before enabling this, should not be used for access protection!
    advanced: true
    optional: true
modbus:
  host:
  id: 1
  modbus: tcpip
  port: 1502
  tcpip: true