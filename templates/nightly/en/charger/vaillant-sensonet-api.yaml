      type: template
      template: vaillant
      user: # Username, e.g. email address, user id, etc. (optional)
      password: # Password, Service account password (optional)
      realm: germany # Region, [albania, austria, belgium, bosnia, bulgaria, croatia, cyprus, czechrepublic, denmark, estonia, finland, france, georgia, germany, greece, hungary, ireland, italy, kosovo, latvia, lithuania, luxembourg, moldavia, netherlands, new-zealand, north-macedonia, norway, poland, portugal, romania, serbia, slovakia, slovenia, spain, sweden, switzerland, turkiye, ukraine, unitedkingdom, uzbekistan] (optional)
      zone: # Boost zone ID, optional
      setpoint: # Boost temperature, optional
      system: # Name of the system, Required if multiple systems are present in the account (optional)
    advanced: |
