template: openwb
product:
  identifier: openwb-series2
  brand: openWB
  description: series2
description: |
  The wallbox has to be configured as loadpoint.
render:
  - default: |
      type: template
      template: openwb
      host: 192.0.2.2 # IP address or hostname
    advanced: |
      type: template
      template: openwb
      host: 192.0.2.2 # IP address or hostname
      connector: 1 # Connector number, For multi-connector stations. Numbering starts at 1. (optional)
      phases1p3p: false # Charger is equipped with phase switching feature, optional
params:
  - name: host
    example: 192.0.2.2
    default:
    choice: []
    unit:
    description: IP address or hostname
    help:
    advanced: false
    optional: false
  - name: connector
    example:
    default: 1
    choice: []
    unit:
    description: Connector number
    help: For multi-connector stations. Numbering starts at 1.
    advanced: true
    optional: true
  - name: phases1p3p
    example:
    default: false
    choice: []
    unit:
    description: Charger is equipped with phase switching feature
    help:
    advanced: true
    optional: true