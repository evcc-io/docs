template: goodwe-wifi-et
product:
  identifier: goodwe-et-eh-bt-bh-hybrid-inverter-wifi
  brand: GoodWe
  description: ET/EH/BT/BH Hybrid Inverter (WiFi)
capabilities: ["battery-control"]
requirements: ["skiptest"]
render:
  - usage: grid
    default: |
      type: template
      template: goodwe-wifi-et
      usage: grid
      host: 192.0.2.2 # IP address or hostname
    advanced: |
      type: template
      template: goodwe-wifi-et
      usage: grid
      host: 192.0.2.2 # IP address or hostname
      delay: 0.1s # Delay, optional
  - usage: pv
    default: |
      type: template
      template: goodwe-wifi-et
      usage: pv
      host: 192.0.2.2 # IP address or hostname
    advanced: |
      type: template
      template: goodwe-wifi-et
      usage: pv
      host: 192.0.2.2 # IP address or hostname
      delay: 0.1s # Delay, optional
  - usage: battery
    default: |
      type: template
      template: goodwe-wifi-et
      usage: battery
      host: 192.0.2.2 # IP address or hostname
      capacity: 50 # Battery capacity (kWh), optional
      minsoc: 10 # Minimum charge (%), Lower limit when discharging the battery in normal operation (optional)
      maxsoc: 100 # Maximum charge (%), Upper limit when charging the battery from the grid (optional)
    advanced: |
      type: template
      template: goodwe-wifi-et
      usage: battery
      host: 192.0.2.2 # IP address or hostname
      capacity: 50 # Battery capacity (kWh), optional
      minsoc: 10 # Minimum charge (%), Lower limit when discharging the battery in normal operation (optional)
      maxsoc: 100 # Maximum charge (%), Upper limit when charging the battery from the grid (optional)
      delay: 0.1s # Delay, optional
      maxchargepower: 10000 # Maximum charge power (W), For forced charging of the battery. (optional)
      maxdischargepower: 10000 # Maximum discharge power (W), Maximum discharge power of the storage. (optional)
params:
  - name: host
    example: 192.0.2.2
    default:
    choice: []
    unit:
    description: IP address or hostname
    help:
    advanced: false
    optional: false
  - name: capacity
    example: 50
    default:
    choice: []
    unit: kWh
    description: Battery capacity
    help:
    advanced: false
    optional: true
  - name: minsoc
    example: 25
    default: 10
    choice: []
    unit: '%'
    description: Minimum charge
    help: Lower limit when discharging the battery in normal operation
    advanced: false
    optional: true
  - name: maxsoc
    example: 95
    default: 100
    choice: []
    unit: '%'
    description: Maximum charge
    help: Upper limit when charging the battery from the grid
    advanced: false
    optional: true
  - name: delay
    example:
    default: 0.1s
    choice: []
    unit:
    description: Delay
    help:
    advanced: true
    optional: true
  - name: maxchargepower
    example:
    default: 10000
    choice: []
    unit: W
    description: Maximum charge power
    help: For forced charging of the battery.
    advanced: true
    optional: true
  - name: maxdischargepower
    example:
    default: 10000
    choice: []
    unit: W
    description: Maximum discharge power
    help: Maximum discharge power of the storage.
    advanced: true
    optional: true