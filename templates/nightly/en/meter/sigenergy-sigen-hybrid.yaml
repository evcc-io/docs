template: sigenergy
product:
  identifier: sigenergy-sigen-hybrid
  brand: Sigenergy
  description: Sigen Hybrid
capabilities: ["battery-control"]
description: |
  Modbus TCP must be enabled in the configuration app with installer rights. This option is not available in the mySigen app for customers.
render:
  - usage: grid
    default: |
      type: template
      template: sigenergy
      usage: grid
      host: 192.0.2.2 # IP address or hostname
      port: 502 # Port, optional
      id: 1 # ID, optional
    advanced: |
      type: template
      template: sigenergy
      usage: grid
      host: 192.0.2.2 # IP address or hostname
      port: 502 # Port, optional
      id: 1 # ID, optional
  - usage: pv
    default: |
      type: template
      template: sigenergy
      usage: pv
      host: 192.0.2.2 # IP address or hostname
      port: 502 # Port, optional
      id: 1 # ID, optional
    advanced: |
      type: template
      template: sigenergy
      usage: pv
      host: 192.0.2.2 # IP address or hostname
      port: 502 # Port, optional
      id: 1 # ID, optional
      maxacpower: 0 # Maximum AC power of the hybrid inverter (W), optional
  - usage: battery
    default: |
      type: template
      template: sigenergy
      usage: battery
      host: 192.0.2.2 # IP address or hostname
      port: 502 # Port, optional
      id: 1 # ID, optional
      capacity: 50 # Battery capacity (kWh), optional
      minsoc: 25 # Minimum charge (%), Lower limit when discharging the battery in normal operation (optional)
      maxsoc: 95 # Maximum charge (%), Upper limit when charging the battery from the grid (optional)
    advanced: |
      type: template
      template: sigenergy
      usage: battery
      host: 192.0.2.2 # IP address or hostname
      port: 502 # Port, optional
      id: 1 # ID, optional
      capacity: 50 # Battery capacity (kWh), optional
      minsoc: 25 # Minimum charge (%), Lower limit when discharging the battery in normal operation (optional)
      maxsoc: 95 # Maximum charge (%), Upper limit when charging the battery from the grid (optional)
      maxchargepower: # Maximum charge power (W), For forced charging of the battery. (optional)
      maxdischargepower: # Maximum discharge power (W), Maximum discharge power of the storage. (optional)
params:
  - name: host
    example: 192.0.2.2
    default:
    choice: []
    unit:
    description: IP address or hostname
    help:
    advanced: false
    optional: false
  - name: port
    example:
    default: 502
    choice: []
    unit:
    description: Port
    help:
    advanced: false
    optional: true
  - name: id
    example:
    default: 1
    choice: []
    unit:
    description: ID
    help:
    advanced: false
    optional: true
  - name: capacity
    example: 50
    default:
    choice: []
    unit: kWh
    description: Battery capacity
    help:
    advanced: false
    optional: true
  - name: minsoc
    example: 25
    default:
    choice: []
    unit: '%'
    description: Minimum charge
    help: Lower limit when discharging the battery in normal operation
    advanced: false
    optional: true
  - name: maxsoc
    example: 95
    default:
    choice: []
    unit: '%'
    description: Maximum charge
    help: Upper limit when charging the battery from the grid
    advanced: false
    optional: true
  - name: maxacpower
    example: 5000
    default: 0
    choice: []
    unit: W
    description: Maximum AC power of the hybrid inverter
    help:
    advanced: true
    optional: true
  - name: maxchargepower
    example:
    default:
    choice: []
    unit: W
    description: Maximum charge power
    help: For forced charging of the battery.
    advanced: true
    optional: true
  - name: maxdischargepower
    example:
    default:
    choice: []
    unit: W
    description: Maximum discharge power
    help: Maximum discharge power of the storage.
    advanced: true
    optional: true