template: zendure-hyper
product:
  identifier: zendure-hyper-2000
  brand: Zendure
  description: Hyper 2000
requirements: ["skiptest"]
render:
  - usage: pv
    default: |
      type: template
      template: zendure-hyper
      usage: pv
      account: dev@zendure.com # Account ID
      serial: VU5D99F74021B04 # Serial, You can find this in the Zendure App in the settings of the device
      region: EU # Region, [EU, Global]
      timeout: 10s # Timeout, optional
    advanced: |
      type: template
      template: zendure-hyper
      usage: pv
      account: dev@zendure.com # Account ID
      serial: VU5D99F74021B04 # Serial, You can find this in the Zendure App in the settings of the device
      region: EU # Region, [EU, Global]
      timeout: 10s # Timeout, optional
  - usage: battery
    default: |
      type: template
      template: zendure-hyper
      usage: battery
      account: dev@zendure.com # Account ID
      serial: VU5D99F74021B04 # Serial, You can find this in the Zendure App in the settings of the device
      region: EU # Region, [EU, Global]
      minsoc: 25 # Minimum charge (%), Lower limit when discharging the battery in normal operation (optional)
      maxsoc: 95 # Maximum charge (%), Upper limit when charging the battery from the grid (optional)
      timeout: 10s # Timeout, optional
    advanced: |
      type: template
      template: zendure-hyper
      usage: battery
      account: dev@zendure.com # Account ID
      serial: VU5D99F74021B04 # Serial, You can find this in the Zendure App in the settings of the device
      region: EU # Region, [EU, Global]
      minsoc: 25 # Minimum charge (%), Lower limit when discharging the battery in normal operation (optional)
      maxsoc: 95 # Maximum charge (%), Upper limit when charging the battery from the grid (optional)
      timeout: 10s # Timeout, optional
      capacity: 2 # Battery capacity (kWh), optional
      maxchargepower: 1200 # Maximum charge power (W), For forced charging of the battery. (optional)
      maxdischargepower: 800 # Maximum discharge power (W), Maximum discharge power of the storage. (optional)
params:
  - name: account
    example: dev@zendure.com
    default:
    choice: []
    unit:
    description: Account ID
    help:
    advanced: false
    optional: false
  - name: serial
    example: VU5D99F74021B04
    default:
    choice: []
    unit:
    description: Serial
    help: You can find this in the Zendure App in the settings of the device
    advanced: false
    optional: false
  - name: region
    example:
    default: EU
    choice: ['EU', 'Global']
    unit:
    description: Region
    help:
    advanced: false
    optional: false
  - name: minsoc
    example: 25
    default:
    choice: []
    unit: '%'
    description: Minimum charge
    help: Lower limit when discharging the battery in normal operation
    advanced: false
    optional: true
  - name: maxsoc
    example: 95
    default:
    choice: []
    unit: '%'
    description: Maximum charge
    help: Upper limit when charging the battery from the grid
    advanced: false
    optional: true
  - name: timeout
    example: 10s
    default:
    choice: []
    unit:
    description: Timeout
    help:
    advanced: false
    optional: true
  - name: capacity
    example: 50
    default: 2
    choice: []
    unit: kWh
    description: Battery capacity
    help:
    advanced: true
    optional: true
  - name: maxchargepower
    example:
    default: 1200
    choice: []
    unit: W
    description: Maximum charge power
    help: For forced charging of the battery.
    advanced: true
    optional: true
  - name: maxdischargepower
    example:
    default: 800
    choice: []
    unit: W
    description: Maximum discharge power
    help: Maximum discharge power of the storage.
    advanced: true
    optional: true