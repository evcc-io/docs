template: enphase-modbus
product:
  identifier: enphase-iq-gateway-modbus
  brand: Enphase
  description: IQ Gateway (Modbus)
description: |
  Requires Enphase support to enable modbus functionality on IQ Gateway.

render:
  - usage: pv
    default: |
      type: template
      template: enphase-modbus
      usage: pv

      # Modbus TCP
      modbus: tcpip
      id: 1
      host:  # Hostname
      port: 502 # Port
params:
  - name: modbus
    example:
    default:
    choice: ['tcpip']
    unit:
    description: Modbus Type
    help:
    advanced: false
    optional: false
modbus:
  host:
  id: 1
  modbus: tcpip
  port: 502
  tcpip: true