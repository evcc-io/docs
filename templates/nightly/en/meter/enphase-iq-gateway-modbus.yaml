template: enphase-modbus
product:
  identifier: enphase-iq-gateway-modbus
  brand: Enphase
  description: IQ Gateway (Modbus)
capabilities: ["curtail"]
description: |
  Requires Enphase support to enable modbus functionality on IQ Gateway.

render:
  - usage: pv
    default: |
      type: template
      template: enphase-modbus
      usage: pv

      # Modbus TCP
      modbus: tcpip
      id: 1
      host:  # Hostname
      port: 502 # Port
    advanced: |
      type: template
      template: enphase-modbus
      usage: pv

      # Modbus TCP
      modbus: tcpip
      id: 1
      host:  # Hostname
      port: 502 # Port
      maxacpower: 0 # Maximum AC power of the hybrid inverter (W), optional
params:
  - name: modbus
    example:
    default:
    choice: ['tcpip']
    unit:
    description: Modbus Type
    help:
    advanced: false
    optional: false
  - name: maxacpower
    example: 5000
    default: 0
    choice: []
    unit: W
    description: Maximum AC power of the hybrid inverter
    help:
    advanced: true
    optional: true
modbus:
  host:
  id: 1
  modbus: tcpip
  port: 502
  tcpip: true