template: stromleser
product:
  identifier: stromleser-one-ir-reader
  brand: stromleser.one
  description: IR Reader
description: |
  Requires a stromleser.one device accessible on the local network.
render:
  - usage: grid
    default: |
      type: template
      template: stromleser
      usage: grid
      host: 192.0.2.2 # IP address or hostname
    advanced: |
      type: template
      template: stromleser
      usage: grid
      host: 192.0.2.2 # IP address or hostname
      cache: 15s # Cache, Time interval for data refresh (optional)
  - usage: pv
    default: |
      type: template
      template: stromleser
      usage: pv
      host: 192.0.2.2 # IP address or hostname
    advanced: |
      type: template
      template: stromleser
      usage: pv
      host: 192.0.2.2 # IP address or hostname
      cache: 15s # Cache, Time interval for data refresh (optional)
params:
  - name: host
    example: 192.0.2.2
    default:
    choice: []
    unit:
    description: IP address or hostname
    help:
    advanced: false
    optional: false
  - name: cache
    example: 5m
    default: 15s
    choice: []
    unit:
    description: Cache
    help: Time interval for data refresh
    advanced: true
    optional: true