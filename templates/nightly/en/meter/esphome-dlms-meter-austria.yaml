template: esphome-dlms-austria
product:
  identifier: esphome-dlms-meter-austria
  brand: ESPHome
  description: DLMS Meter Austria
description: |
  Requires an ESPHome node running the `dlms_meter` component (e.g., from `github://SimonFischer04/esphome@dlms-meter`),
  configured for Austrian DLMS meters.

render:
  - usage: grid
    default: |
      type: template
      template: esphome-dlms-austria
      usage: grid
      host: 192.0.2.2 # IP address or hostname
      firmware: <2026.1 # ESPHome firmware version, ESPHome 2026.1+ addresses sensors by entity name. The legacy /sensor/<object_id> URLs are deprecated and will be removed in ESPHome 2026.7.0. Choose '>=2026.1' if your device runs ESPHome 2026.1 or newer. [<2026.1, >=2026.1] (optional)
    advanced: |
      type: template
      template: esphome-dlms-austria
      usage: grid
      host: 192.0.2.2 # IP address or hostname
      firmware: <2026.1 # ESPHome firmware version, ESPHome 2026.1+ addresses sensors by entity name. The legacy /sensor/<object_id> URLs are deprecated and will be removed in ESPHome 2026.7.0. Choose '>=2026.1' if your device runs ESPHome 2026.1 or newer. [<2026.1, >=2026.1] (optional)
      timeout: 10s # Timeout, optional
params:
  - name: host
    example: 192.0.2.2
    default:
    choice: []
    unit:
    description: IP address or hostname
    help:
    advanced: false
    optional: false
  - name: firmware
    example:
    default: <2026.1
    choice: ['<2026.1', '>=2026.1']
    unit:
    description: ESPHome firmware version
    help: ESPHome 2026.1+ addresses sensors by entity name. The legacy /sensor/<object_id> URLs are deprecated and will be removed in ESPHome 2026.7.0. Choose '>=2026.1' if your device runs ESPHome 2026.1 or newer.
    advanced: false
    optional: true
  - name: timeout
    example: 10s
    default: 10s
    choice: []
    unit:
    description: Timeout
    help:
    advanced: true
    optional: true