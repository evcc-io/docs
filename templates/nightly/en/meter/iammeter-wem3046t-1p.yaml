template: iammeter-1p
product:
  identifier: iammeter-wem3046t-1p
  brand: IAMMETER
  description: WEM3046T (1p)
description: |
  Supports all IAMMETER meters. Multi-channel meters (WEM2067, WEM3080T, WEM3046T, WEM3050T) are addressed as single-phase meters via the `channel` parameter.

render:
  - usage: grid
    default: |
      type: template
      template: iammeter-1p
      usage: grid
      host: 192.0.2.2 # IP address or hostname
      channel: 1 # Meter channel (1-3), optional
    advanced: |
      type: template
      template: iammeter-1p
      usage: grid
      host: 192.0.2.2 # IP address or hostname
      channel: 1 # Meter channel (1-3), optional
      cache: 2s # Cache, Time interval for data refresh (optional)
  - usage: pv
    default: |
      type: template
      template: iammeter-1p
      usage: pv
      host: 192.0.2.2 # IP address or hostname
      channel: 1 # Meter channel (1-3), optional
    advanced: |
      type: template
      template: iammeter-1p
      usage: pv
      host: 192.0.2.2 # IP address or hostname
      channel: 1 # Meter channel (1-3), optional
      cache: 2s # Cache, Time interval for data refresh (optional)
  - usage: charge
    default: |
      type: template
      template: iammeter-1p
      usage: charge
      host: 192.0.2.2 # IP address or hostname
      channel: 1 # Meter channel (1-3), optional
    advanced: |
      type: template
      template: iammeter-1p
      usage: charge
      host: 192.0.2.2 # IP address or hostname
      channel: 1 # Meter channel (1-3), optional
      cache: 2s # Cache, Time interval for data refresh (optional)
params:
  - name: host
    example: 192.0.2.2
    default:
    choice: []
    unit:
    description: IP address or hostname
    help:
    advanced: false
    optional: false
  - name: channel
    example:
    default: 1
    choice: []
    unit:
    description: Meter channel (1-3)
    help:
    advanced: false
    optional: true
  - name: cache
    example: 5m
    default: 2s
    choice: []
    unit:
    description: Cache
    help: Time interval for data refresh
    advanced: true
    optional: true