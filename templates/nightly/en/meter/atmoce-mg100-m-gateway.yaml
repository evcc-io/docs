template: atmoce
product:
  identifier: atmoce-mg100-m-gateway
  brand: Atmoce
  description: MG100 M-gateway
capabilities: ["battery-control", "curtail", "dim"]
description: |
  Support for Atmoce MG100 (included with MC100 and MC100-T).
  Requires installer to enable Modbus TCP in configuration or through Atmozen app; available in firmware 01.01.00.18.10 or later.
  'Grid Recharging' and 'Export Power' must be enabled in the Atmozen app to allow battery (dis)charging to/from grid.

render:
  - usage: grid
    default: |
      type: template
      template: atmoce
      usage: grid

      # Modbus TCP
      modbus: tcpip
      id: 1
      host:  # Hostname
      port: 502 # Port
    advanced: |
      type: template
      template: atmoce
      usage: grid

      # Modbus TCP
      modbus: tcpip
      id: 1
      host:  # Hostname
      port: 502 # Port
      firmware: <01.01.00.28.15 # Firmware version, Firmware 01.01.00.28.15 and higher allows for correct hold/holdcharge functionality, dimming and curtailing. Older versions only support hold function without (dis)charge. [<01.01.00.28.15, >=01.01.00.28.15] (optional)
  - usage: pv
    default: |
      type: template
      template: atmoce
      usage: pv

      # Modbus TCP
      modbus: tcpip
      id: 1
      host:  # Hostname
      port: 502 # Port
    advanced: |
      type: template
      template: atmoce
      usage: pv

      # Modbus TCP
      modbus: tcpip
      id: 1
      host:  # Hostname
      port: 502 # Port
      maxacpower: 0 # Maximum AC power of the hybrid inverter (W), optional
      firmware: <01.01.00.28.15 # Firmware version, Firmware 01.01.00.28.15 and higher allows for correct hold/holdcharge functionality, dimming and curtailing. Older versions only support hold function without (dis)charge. [<01.01.00.28.15, >=01.01.00.28.15] (optional)
  - usage: battery
    default: |
      type: template
      template: atmoce
      usage: battery

      # Modbus TCP
      modbus: tcpip
      id: 1
      host:  # Hostname
      port: 502 # Port
      capacity: 50 # Battery capacity (kWh), optional
    advanced: |
      type: template
      template: atmoce
      usage: battery

      # Modbus TCP
      modbus: tcpip
      id: 1
      host:  # Hostname
      port: 502 # Port
      capacity: 50 # Battery capacity (kWh), optional
      minsoc: 10 # Minimum charge (%), Lower limit when discharging the battery in normal operation (optional)
      maxsoc: 100 # Maximum charge (%), Upper limit when charging the battery from the grid (optional)
      maxchargepower: # Maximum charge power (W), For forced charging of the battery. (optional)
      maxdischargepower: # Maximum discharge power (W), Maximum discharge power of the storage. (optional)
      firmware: <01.01.00.28.15 # Firmware version, Firmware 01.01.00.28.15 and higher allows for correct hold/holdcharge functionality, dimming and curtailing. Older versions only support hold function without (dis)charge. [<01.01.00.28.15, >=01.01.00.28.15] (optional)
params:
  - name: modbus
    example:
    default:
    choice: ['tcpip']
    unit:
    description: Modbus Type
    help:
    advanced: false
    optional: false
  - name: capacity
    example: 50
    default:
    choice: []
    unit: kWh
    description: Battery capacity
    help:
    advanced: false
    optional: true
  - name: maxacpower
    example: 5000
    default: 0
    choice: []
    unit: W
    description: Maximum AC power of the hybrid inverter
    help:
    advanced: true
    optional: true
  - name: minsoc
    example: 25
    default: 10
    choice: []
    unit: '%'
    description: Minimum charge
    help: Lower limit when discharging the battery in normal operation
    advanced: true
    optional: true
  - name: maxsoc
    example: 95
    default: 100
    choice: []
    unit: '%'
    description: Maximum charge
    help: Upper limit when charging the battery from the grid
    advanced: true
    optional: true
  - name: maxchargepower
    example:
    default:
    choice: []
    unit: W
    description: Maximum charge power
    help: For forced charging of the battery.
    advanced: true
    optional: true
  - name: maxdischargepower
    example:
    default:
    choice: []
    unit: W
    description: Maximum discharge power
    help: Maximum discharge power of the storage.
    advanced: true
    optional: true
  - name: firmware
    example:
    default: <01.01.00.28.15
    choice: ['<01.01.00.28.15', '>=01.01.00.28.15']
    unit:
    description: Firmware version
    help: Firmware 01.01.00.28.15 and higher allows for correct hold/holdcharge functionality, dimming and curtailing. Older versions only support hold function without (dis)charge.
    advanced: true
    optional: true
modbus:
  delay:
  host:
  id: 1
  modbus: tcpip
  port: 502
  tcpip: true
  timeout: