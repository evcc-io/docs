template: indevolt-hybrid
product:
  identifier: indevolt-powerflex-2000
  brand: Indevolt
  description: PowerFlex 2000
description: |
  Local direct access to Indevolt devices (e.g. Solidflex series) via HTTP API on port 8080.

  The device's IP address can be obtained from the Indevolt app, the router, or via UDP broadcast (port 10000). Assigning a static IP in the router is recommended.

  Battery power sign convention and availability of grid import/export readings (registers 2101/2108) depend on installation (CT clamp) and should be verified.

  See [docs.indevolt.com](https://docs.indevolt.com/docs/hardware/geek/open-data/).

render:
  - usage: grid
    default: |
      type: template
      template: indevolt-hybrid
      usage: grid
      host: 192.0.2.2 # IP address or hostname
    advanced: |
      type: template
      template: indevolt-hybrid
      usage: grid
      host: 192.0.2.2 # IP address or hostname
      user: # Username, e.g. email address, user id, etc. (optional)
      password: # Password, Service account password (optional)
      cache: 5s # Cache, Time interval for data refresh (optional)
  - usage: pv
    default: |
      type: template
      template: indevolt-hybrid
      usage: pv
      host: 192.0.2.2 # IP address or hostname
    advanced: |
      type: template
      template: indevolt-hybrid
      usage: pv
      host: 192.0.2.2 # IP address or hostname
      user: # Username, e.g. email address, user id, etc. (optional)
      password: # Password, Service account password (optional)
      cache: 5s # Cache, Time interval for data refresh (optional)
  - usage: battery
    default: |
      type: template
      template: indevolt-hybrid
      usage: battery
      host: 192.0.2.2 # IP address or hostname
      capacity: 50 # Battery capacity (kWh), optional
      minsoc: 25 # Minimum charge (%), Lower limit when discharging the battery in normal operation (optional)
      maxsoc: 95 # Maximum charge (%), Upper limit when charging the battery from the grid (optional)
    advanced: |
      type: template
      template: indevolt-hybrid
      usage: battery
      host: 192.0.2.2 # IP address or hostname
      capacity: 50 # Battery capacity (kWh), optional
      minsoc: 25 # Minimum charge (%), Lower limit when discharging the battery in normal operation (optional)
      maxsoc: 95 # Maximum charge (%), Upper limit when charging the battery from the grid (optional)
      user: # Username, e.g. email address, user id, etc. (optional)
      password: # Password, Service account password (optional)
      cache: 5s # Cache, Time interval for data refresh (optional)
      maxchargepower: # Maximum charge power (W), For forced charging of the battery. (optional)
      maxdischargepower: # Maximum discharge power (W), Maximum discharge power of the storage. (optional)
