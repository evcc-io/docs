template: victron-vrm
product:
  identifier: azimut-energy
  brand: Azimut Energy
capabilities: ["battery-control"]
description: |
  Abrufen der Victron-Batteriedaten über das VRM-Portal [vrm.victronenergy.com](https://vrm.victronenergy.com). Es wird ein kostenloses User Access Token benötigt.
render:
  - usage: battery
    default: |
      type: template
      template: victron-vrm
      usage: battery
      token: # VRM Token
      site: # Standort-ID
      instance: # Batterie-Instanz-ID
      capacity: 50 # Akkukapazität (kWh), optional
      minsoc: 25 # Minimaler Ladestand (%), Untere Grenze beim Entladen der Batterie im normalen Betrieb (optional)
      maxsoc: 95 # Maximaler Ladestand (%), Oberes Limit beim Laden der Batterie aus dem Netz (optional)
    advanced: |
      type: template
      template: victron-vrm
      usage: battery
      token: # VRM Token
      site: # Standort-ID
      instance: # Batterie-Instanz-ID
      capacity: 50 # Akkukapazität (kWh), optional
      minsoc: 25 # Minimaler Ladestand (%), Untere Grenze beim Entladen der Batterie im normalen Betrieb (optional)
      maxsoc: 95 # Maximaler Ladestand (%), Oberes Limit beim Laden der Batterie aus dem Netz (optional)
      maxchargepower: # Maximale Ladeleistung (W), Für erzwungenes Laden des Speichers. (optional)
      maxdischargepower: # Maximale Entladeleistung (W), Maximale Entladeleistung des Speichers. (optional)
params:
  - name: token
    example:
    default:
    choice: []
    unit:
    description: VRM Token
    help:
    advanced: false
    optional: false
  - name: site
    example:
    default:
    choice: []
    unit:
    description: Standort-ID
    help:
    advanced: false
    optional: false
  - name: instance
    example:
    default:
    choice: []
    unit:
    description: Batterie-Instanz-ID
    help:
    advanced: false
    optional: false
  - name: capacity
    example: 50
    default:
    choice: []
    unit: kWh
    description: Akkukapazität
    help:
    advanced: false
    optional: true
  - name: minsoc
    example: 25
    default:
    choice: []
    unit: '%'
    description: Minimaler Ladestand
    help: Untere Grenze beim Entladen der Batterie im normalen Betrieb
    advanced: false
    optional: true
  - name: maxsoc
    example: 95
    default:
    choice: []
    unit: '%'
    description: Maximaler Ladestand
    help: Oberes Limit beim Laden der Batterie aus dem Netz
    advanced: false
    optional: true
  - name: maxchargepower
    example:
    default:
    choice: []
    unit: W
    description: Maximale Ladeleistung
    help: Für erzwungenes Laden des Speichers.
    advanced: true
    optional: true
  - name: maxdischargepower
    example:
    default:
    choice: []
