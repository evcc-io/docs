template: hoymiles-dtu-mb
product:
  identifier: hoymiles-hmt-hms-series-with-dtu-pro-s-modbus-tcp
  brand: Hoymiles
  description: HMT/HMS-Serie mit DTU PRO S / MODBUS TCP
description: |
  Benötigt wird ein Hoymiles Wechselrichter der HMT/HMS Serie mit DTU PRO S datalogger mit Modbus TCP aktiviert (verbunden mit LAN)

render:
  - usage: pv
    default: |
      type: template
      template: hoymiles-dtu-mb
      usage: pv

      # Modbus TCP
      modbus: tcpip
      id: 1
      host:  # Hostname
      port: 502 # Port
    advanced: |
      type: template
      template: hoymiles-dtu-mb
      usage: pv

      # Modbus TCP
      modbus: tcpip
      id: 1
      host:  # Hostname
      port: 502 # Port
      maxacpower: 0 # Gesamtleistung der Wechselrichter (W), Gesamtleistung der Wechselrichter in Watt (z.B. 3000) (optional)
params:
  - name: modbus
    example:
    default:
    choice: ['tcpip']
    unit:
    description: Modbus Typ
    help:
    advanced: false
    optional: false
  - name: maxacpower
    example: 5000
    default: 0
    choice: []
    unit: W
    description: Gesamtleistung der Wechselrichter
    help: Gesamtleistung der Wechselrichter in Watt (z.B. 3000)
    advanced: true
    optional: true
modbus:
  host:
  id: 1
  modbus: tcpip
  port: 502
  tcpip: true