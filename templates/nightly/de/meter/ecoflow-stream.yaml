template: ecoflow-stream
product:
  identifier: ecoflow-stream
  brand: EcoFlow
  description: Stream
description: |
  Für die Nutzung des EcoFlow Stream Meters benötigen Sie:
  - Einen gültigen Access Key von der EcoFlow Developer Console
  - Den entsprechenden Secret Key
  - Die Seriennummer des Hauptgerätes Ihres Stream Systems

  Diese Credentials erhalten Sie über die EcoFlow Developer Console nach der Registrierung Ihrer Anwendung.

render:
  - usage: grid
    default: |
      type: template
      template: ecoflow-stream
      usage: grid
      accesskey: # Access Key, Access Key aus der EcoFlow Developer Console
      secretkey: # Secret Key, Secret Key aus der EcoFlow Developer Console
      serial: # Seriennummer, optional
      region: auto # API Region: auto (default), europe, or america., Manche Nutzer, z.B. mit Starlink-Internet, sehen in den Logs den "Fehler 8513: accessKey is invalid". Um das zu beheben, kann man die API Region manuell setzen. Mögliche Werte: auto (Standard), europe oder america. [auto, europe, america] (optional)
    advanced: |
      type: template
      template: ecoflow-stream
      usage: grid
      accesskey: # Access Key, Access Key aus der EcoFlow Developer Console
      secretkey: # Secret Key, Secret Key aus der EcoFlow Developer Console
      serial: # Seriennummer, optional
      region: auto # API Region: auto (default), europe, or america., Manche Nutzer, z.B. mit Starlink-Internet, sehen in den Logs den "Fehler 8513: accessKey is invalid". Um das zu beheben, kann man die API Region manuell setzen. Mögliche Werte: auto (Standard), europe oder america. [auto, europe, america] (optional)
      cache: 30s # Cache, Zeitintervall für erneute Datenabfrage (optional)
