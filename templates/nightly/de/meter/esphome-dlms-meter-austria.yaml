template: esphome-dlms-austria
product:
  identifier: esphome-dlms-meter-austria
  brand: ESPHome
  description: DLMS Meter Austria
description: |
  Benötigt ein ESPHome Gerät mit der `dlms_meter` Komponente (z.B. von `github://SimonFischer04/esphome@dlms-meter`),
  konfiguriert für österreichische DLMS-Zähler.

render:
  - usage: grid
    default: |
      type: template
      template: esphome-dlms-austria
      usage: grid
      host: 192.0.2.2 # IP-Adresse oder Hostname
      firmware: <2026.1 # ESPHome Firmware-Version, ESPHome ab 2026.1 adressiert Sensoren über den Entitätsnamen. Die alten /sensor/<object_id> URLs sind veraltet und werden in ESPHome 2026.7.0 entfernt. Wähle '>=2026.1', wenn dein Gerät ESPHome 2026.1 oder neuer verwendet. [<2026.1, >=2026.1] (optional)
    advanced: |
      type: template
      template: esphome-dlms-austria
      usage: grid
      host: 192.0.2.2 # IP-Adresse oder Hostname
      firmware: <2026.1 # ESPHome Firmware-Version, ESPHome ab 2026.1 adressiert Sensoren über den Entitätsnamen. Die alten /sensor/<object_id> URLs sind veraltet und werden in ESPHome 2026.7.0 entfernt. Wähle '>=2026.1', wenn dein Gerät ESPHome 2026.1 oder neuer verwendet. [<2026.1, >=2026.1] (optional)
      timeout: 10s # Zeitüberschreitung, optional
params:
  - name: host
    example: 192.0.2.2
    default:
    choice: []
    unit:
    description: IP-Adresse oder Hostname
    help:
    advanced: false
    optional: false
  - name: firmware
    example:
    default: <2026.1
    choice: ['<2026.1', '>=2026.1']
    unit:
    description: ESPHome Firmware-Version
    help: ESPHome ab 2026.1 adressiert Sensoren über den Entitätsnamen. Die alten /sensor/<object_id> URLs sind veraltet und werden in ESPHome 2026.7.0 entfernt. Wähle '>=2026.1', wenn dein Gerät ESPHome 2026.1 oder neuer verwendet.
    advanced: false
    optional: true
  - name: timeout
    example: 10s
    default: 10s
    choice: []
    unit:
    description: Zeitüberschreitung
    help:
    advanced: true
    optional: true