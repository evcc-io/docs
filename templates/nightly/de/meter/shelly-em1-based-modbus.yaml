template: shelly-em1-modbus
product:
  identifier: shelly-em1-based-modbus
  brand: Shelly
  description: EM1-based (Modbus)
  group: Schaltbare Steckdosen
description: |
  Shelly EM1-basierte Geräte für einphasige Messungen.

render:
  - usage: grid
    default: |
      type: template
      template: shelly-em1-modbus
      usage: grid

      # Modbus TCP
      modbus: tcpip
      id: 1
      host:  # Hostname
      port: 502 # Port
      channel: 0 # Kanal, optional
  - usage: pv
    default: |
      type: template
      template: shelly-em1-modbus
      usage: pv

      # Modbus TCP
      modbus: tcpip
      id: 1
      host:  # Hostname
      port: 502 # Port
      channel: 0 # Kanal, optional
  - usage: charge
    default: |
      type: template
      template: shelly-em1-modbus
      usage: charge

      # Modbus TCP
      modbus: tcpip
      id: 1
      host:  # Hostname
      port: 502 # Port
      channel: 0 # Kanal, optional
params:
  - name: modbus
    example:
    default:
    choice: ['tcpip']
    unit:
    description: Modbus Typ
    help:
    advanced: false
    optional: false
  - name: channel
    example:
    default: 0
    choice: []
    unit:
    description: Kanal
    help:
    advanced: false
    optional: true
modbus:
  host:
  id: 1
  modbus: tcpip
  port: 502
  tcpip: true