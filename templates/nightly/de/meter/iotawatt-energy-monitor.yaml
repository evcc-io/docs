template: iotawatt
product:
  identifier: iotawatt-energy-monitor
  brand: IoTaWatt
  description: Energy Monitor
description: |
  Erfordert ein IoTaWatt-Gerät im lokalen Netzwerk.
  Verfügbare Seriennamen finden Sie auf der IoTaWatt-Statusseite (`http://<device-ip>`).
  Für einphasige Installationen nur die Hauptserie konfigurieren (z.B. `GridNet`, `Solar`).
  Für dreiphasig je eine Serie pro Phase angeben (z.B. `Grid_A`, `Grid_B`, `Grid_C`).

render:
  - usage: grid
    default: |
      type: template
      template: iotawatt
      usage: grid
      host: 192.0.2.2 # IP-Adresse oder Hostname
      series: GridNet # L1 / Einphasig-Serie, IoTaWatt Serienname (Watt). Verfügbare Serien auf der IoTaWatt-Statusseite prüfen.
    advanced: |
      type: template
      template: iotawatt
      usage: grid
      host: 192.0.2.2 # IP-Adresse oder Hostname
      series: GridNet # L1 / Einphasig-Serie, IoTaWatt Serienname (Watt). Verfügbare Serien auf der IoTaWatt-Statusseite prüfen.
      seriesL2: # L2 Serie (Dreiphasig), Serienname für Phase L2. Für einphasig leer lassen. (optional)
      seriesL3: # L3 Serie (Dreiphasig), Serienname für Phase L3. Für einphasig leer lassen. (optional)
      cache: 2s # Cache, Zeitintervall für erneute Datenabfrage (optional)
  - usage: pv
    default: |
      type: template
      template: iotawatt
      usage: pv
      host: 192.0.2.2 # IP-Adresse oder Hostname
      series: GridNet # L1 / Einphasig-Serie, IoTaWatt Serienname (Watt). Verfügbare Serien auf der IoTaWatt-Statusseite prüfen.
    advanced: |
      type: template
      template: iotawatt
      usage: pv
      host: 192.0.2.2 # IP-Adresse oder Hostname
      series: GridNet # L1 / Einphasig-Serie, IoTaWatt Serienname (Watt). Verfügbare Serien auf der IoTaWatt-Statusseite prüfen.
      seriesL2: # L2 Serie (Dreiphasig), Serienname für Phase L2. Für einphasig leer lassen. (optional)
      seriesL3: # L3 Serie (Dreiphasig), Serienname für Phase L3. Für einphasig leer lassen. (optional)
      cache: 2s # Cache, Zeitintervall für erneute Datenabfrage (optional)
  - usage: charge
    default: |
      type: template
      template: iotawatt
      usage: charge
      host: 192.0.2.2 # IP-Adresse oder Hostname
      series: GridNet # L1 / Einphasig-Serie, IoTaWatt Serienname (Watt). Verfügbare Serien auf der IoTaWatt-Statusseite prüfen.
    advanced: |
      type: template
      template: iotawatt
      usage: charge
      host: 192.0.2.2 # IP-Adresse oder Hostname
      series: GridNet # L1 / Einphasig-Serie, IoTaWatt Serienname (Watt). Verfügbare Serien auf der IoTaWatt-Statusseite prüfen.
      seriesL2: # L2 Serie (Dreiphasig), Serienname für Phase L2. Für einphasig leer lassen. (optional)
      seriesL3: # L3 Serie (Dreiphasig), Serienname für Phase L3. Für einphasig leer lassen. (optional)
      cache: 2s # Cache, Zeitintervall für erneute Datenabfrage (optional)
params:
  - name: host
    example: 192.0.2.2
    default:
    choice: []
    unit:
    description: IP-Adresse oder Hostname
    help:
    advanced: false
    optional: false
  - name: series
    example: GridNet
    default:
    choice: []
    unit:
    description: L1 / Einphasig-Serie
    help: IoTaWatt Serienname (Watt). Verfügbare Serien auf der IoTaWatt-Statusseite prüfen.
    advanced: false
    optional: false
  - name: seriesL2
    example:
    default:
    choice: []
    unit:
    description: L2 Serie (Dreiphasig)
    help: Serienname für Phase L2. Für einphasig leer lassen.
    advanced: true
    optional: true
  - name: seriesL3
    example:
    default:
    choice: []
    unit:
    description: L3 Serie (Dreiphasig)
    help: Serienname für Phase L3. Für einphasig leer lassen.
    advanced: true
    optional: true
  - name: cache
    example: 5m
    default: 2s
    choice: []
    unit:
    description: Cache
    help: Zeitintervall für erneute Datenabfrage
    advanced: true
    optional: true