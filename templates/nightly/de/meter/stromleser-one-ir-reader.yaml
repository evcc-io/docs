template: stromleser
product:
  identifier: stromleser-one-ir-reader
  brand: stromleser.one
  description: IR Reader
description: |
  Erfordert ein stromleser.one-Gerät im lokalen Netzwerk.
render:
  - usage: grid
    default: |
      type: template
      template: stromleser
      usage: grid
      host: 192.0.2.2 # IP-Adresse oder Hostname
    advanced: |
      type: template
      template: stromleser
      usage: grid
      host: 192.0.2.2 # IP-Adresse oder Hostname
      cache: 15s # Cache, Zeitintervall für erneute Datenabfrage (optional)
  - usage: pv
    default: |
      type: template
      template: stromleser
      usage: pv
      host: 192.0.2.2 # IP-Adresse oder Hostname
    advanced: |
      type: template
      template: stromleser
      usage: pv
      host: 192.0.2.2 # IP-Adresse oder Hostname
      cache: 15s # Cache, Zeitintervall für erneute Datenabfrage (optional)
params:
  - name: host
    example: 192.0.2.2
    default:
    choice: []
    unit:
    description: IP-Adresse oder Hostname
    help:
    advanced: false
    optional: false
  - name: cache
    example: 5m
    default: 15s
    choice: []
    unit:
    description: Cache
    help: Zeitintervall für erneute Datenabfrage
    advanced: true
    optional: true