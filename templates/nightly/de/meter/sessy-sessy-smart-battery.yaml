    example: 192.0.2.2
    default:
    choice: []
    unit:
    description: IP-Adresse oder Hostname
    help:
    advanced: false
    optional: false
  - name: user
    example:
    default:
    choice: []
    unit:
    description: Benutzerkonto
    help: bspw. E-Mail Adresse, User Id, etc.
    advanced: false
    optional: false
  - name: password
    example:
    default:
    choice: []
    unit:
    description: Passwort
    help: Bei führenden Nullen bitte in einfache Hochkommata setzen
    advanced: false
    optional: false
  - name: capacity
    example: 50
    default: 5
    choice: []
    unit: kWh
    description: Akkukapazität
    help:
    advanced: false
    optional: true
  - name: minsoc
    example: 25
