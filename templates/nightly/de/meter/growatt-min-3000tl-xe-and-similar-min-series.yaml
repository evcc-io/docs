template: growatt-min-tlxe
product:
  identifier: growatt-min-3000tl-xe-and-similar-min-series
  brand: Growatt
  description: MIN 3000TL-XE (and similar MIN series)
render:
  - default: |
      type: template
      template: growatt-min-tlxe

      # RS485 via adapter (Modbus RTU)
      modbus: rs485serial
      id: 1
      device: /dev/ttyUSB0 # USB-RS485 Adapter Adresse
      baudrate: 9600 # Prüfe die Geräteeinstellungen, typische Werte sind 9600, 19200, 38400, 57600, 115200
      comset: "8N1" # Kommunikationsparameter für den Adapter

      # RS485 via TCP/IP (Modbus RTU)
      modbus: rs485tcpip
      id: 1
      host:  # Hostname
      port: 502 # Port

      # Modbus TCP
      modbus: tcpip
      id: 1
      host:  # Hostname
      port: 502 # Port
params:
  - name: modbus
    example:
    default:
    choice: ['rs485', 'tcpip']
    unit:
    description: Modbus Typ
    help:
    advanced: false
    optional: false
modbus:
  baudrate: 9600
  comset: 8N1
  delay:
  device: /dev/ttyUSB0
  host:
  id: 1
  port: 502
  rs485serial: true
  rs485tcpip: true
  tcpip: true
  timeout: