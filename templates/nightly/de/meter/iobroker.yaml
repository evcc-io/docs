template: iobroker
product:
  identifier: iobroker
  brand: ioBroker
  group: Generische Unterstützung
requirements: ["skiptest"]
description: |
  Auf der verwendeten ioBroker Instanz muss der `rest-api` adapter (nicht `simple-api`) installiert sein.
  Authentifiziert werden kann nur mittels `basic` authentication. Wird kein Passwort angegeben, so wird keine Authentifizierung durchgeführt.
  Bei der Angabe der Entities für die einzelnen Messwerte ist darauf zu achten, dass diese korrekt URL-Encoded sind.
  So wird aus `shelly.0.SHEM-3#8CAAB561991E#1.Total.ConsumedPower  shelly.0.SHEM-3%238CAAB561991E%231.Total.ConsumedPower`

render:
  - usage: grid
    default: |
      type: template
      template: iobroker
      usage: grid
      uri: https://iobroker.homelab.lan:8082 # Der vollständige URI der ioBroker Instanz, HTTP(S) Adresse
      user: # Benutzerkonto, bspw. E-Mail Adresse, User Id, etc. (optional)
      password: # Passwort, Zugangspasswort des Dienstes (optional)
      power: # Leistung (W), optional
      soc: # Ladestand (%), optional
    advanced: |
      type: template
      template: iobroker
      usage: grid
      uri: https://iobroker.homelab.lan:8082 # Der vollständige URI der ioBroker Instanz, HTTP(S) Adresse
      user: # Benutzerkonto, bspw. E-Mail Adresse, User Id, etc. (optional)
      password: # Passwort, Zugangspasswort des Dienstes (optional)
      power: # Leistung (W), optional
      soc: # Ladestand (%), optional
      cache: 5m # Cache, Zeitintervall für erneute Datenabfrage (optional)
      energy: # Zählerstand (kWh), optional
      currentL1: # L1 Stromstärke (A), optional
      currentL2: # L2 Stromstärke (A), optional
      currentL3: # L3 Stromstärke (A), optional
