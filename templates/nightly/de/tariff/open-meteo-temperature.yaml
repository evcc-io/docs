template: open-meteo-temperature
product:
  identifier: open-meteo-temperature
  brand: Open-Meteo Temperature
  group: Temperaturvorhersage
requirements: ["skiptest"]
description: |
  Freie Wetter-API [open-meteo.com](https://open-meteo.com) für Außentemperaturdaten in 15-Minuten-Intervallen. Open-Meteo ist eine Open-Source-Wetter-API und bietet kostenlosen Zugriff für nicht-kommerzielle Nutzung. Kein API-Schlüssel erforderlich.
render:
  - default: |
      type: template
      template: open-meteo-temperature
      lat: 55.7351 # Breitengrad
      lon: 9.1275 # Längengrad
    advanced: |
      type: template
      template: open-meteo-temperature
      lat: 55.7351 # Breitengrad
      lon: 9.1275 # Längengrad
      interval: 1h # Intervall, optional
params:
  - name: lat
    example: 55.7351
    default:
    choice: []
    unit:
    description: Breitengrad
    help:
    advanced: false
    optional: false
  - name: lon
    example: 9.1275
    default:
    choice: []
    unit:
    description: Längengrad
    help:
    advanced: false
    optional: false
  - name: interval
    example:
    default: 1h
    choice: []
    unit:
    description: Intervall
    help:
    advanced: true
    optional: true