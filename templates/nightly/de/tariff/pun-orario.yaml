template: pun
product:
  identifier: pun-orario
  brand: PUN Orario
  group: Dynamischer Strompreis
countries: ["IT"]
requirements: ["skiptest"]
description: |
  Preisdaten von [mercatoelettrico.org](https://www.mercatoelettrico.org/it/). Wird oft zur Einspeisung ins Netz verwendet.
render:
  - default: |
      type: template
      template: pun
      zone: # Marktzone, Italienische Strommarktzone. Wenn keine Zone angegeben wird, wird der nationale Einheitspreis (PUN) verwendet. [NORD, CNOR, CSUD, SUD, CALA, SICI, SARD] (optional)
    advanced: |
      type: template
      template: pun
      zone: # Marktzone, Italienische Strommarktzone. Wenn keine Zone angegeben wird, wird der nationale Einheitspreis (PUN) verwendet. [NORD, CNOR, CSUD, SUD, CALA, SICI, SARD] (optional)
      charges: # Aufschlag, Zusätzlicher fester Aufschlag pro kWh (optional)
      chargesZones: # Aufschlagszonen, Zeitabhängige Aufschläge, die den Standardaufschlag überschreiben. (optional)
      tax: # Steuer, Zusätzlicher prozentualer Aufschlag (z.B. 0.2 für 20%) (optional)
      formula: math.Max((price + charges) * (1 + tax), 0.0) # Formel, Individuelle Formel zur Berechnung des Preises (optional)
params:
  - name: zone
    example:
    default:
    choice: ['NORD', 'CNOR', 'CSUD', 'SUD', 'CALA', 'SICI', 'SARD']
    unit:
    description: Marktzone
    help: Italienische Strommarktzone. Wenn keine Zone angegeben wird, wird der nationale Einheitspreis (PUN) verwendet.
    advanced: false
    optional: true
  - name: charges
    example:
    default:
    choice: []
    unit:
    description: Aufschlag
    help: Zusätzlicher fester Aufschlag pro kWh
    advanced: true
    optional: true
  - name: chargesZones
    example:
    default:
    choice: []
    unit:
    description: Aufschlagszonen
    help: Zeitabhängige Aufschläge, die den Standardaufschlag überschreiben.
    advanced: true
    optional: true
  - name: tax
    example:
    default:
    choice: []
    unit:
    description: Steuer
    help: Zusätzlicher prozentualer Aufschlag (z.B. 0.2 für 20%)
    advanced: true
    optional: true
  - name: formula
    example: math.Max((price + charges) * (1 + tax), 0.0)
    default:
    choice: []
    unit:
    description: Formel
    help: Individuelle Formel zur Berechnung des Preises
    advanced: true
    optional: true