template: demo-dynamic-grid
product:
  identifier: demo-market-price
  description: Demo Börsenpreis
  group: Dynamischer Strompreis
requirements: ["skiptest"]
description: |
  Zu Demonstrationszwecken. Simuliert dynamische Strompreise ähnlich EPEX Spotmarkt mit typischen Tagesmustern.
render:
  - default: |
      type: template
      template: demo-dynamic-grid
      min: 0.10 # Minimaler Preis, Niedrigster Preis, typisch zur Mittagszeit (kann negativ sein) (optional)
      max: 0.39 # Maximaler Preis, Höchster Preis, typisch am Abend (optional)
    advanced: |
      type: template
      template: demo-dynamic-grid
      min: 0.10 # Minimaler Preis, Niedrigster Preis, typisch zur Mittagszeit (kann negativ sein) (optional)
      max: 0.39 # Maximaler Preis, Höchster Preis, typisch am Abend (optional)
      noise: 0.01 # Preisschwankung, Zufällige Schwankung pro Slot (±Wert) (optional)
      charges: # Aufschlag, Zusätzlicher fester Aufschlag pro kWh (optional)
      chargesZones: # Aufschlagszonen, Zeitabhängige Aufschläge, die den Standardaufschlag überschreiben. (optional)
      tax: # Steuer, Zusätzlicher prozentualer Aufschlag (z.B. 0.2 für 20%) (optional)
      formula: math.Max((price + charges) * (1 + tax), 0.0) # Formel, Individuelle Formel zur Berechnung des Preises (optional)
params:
  - name: min
    example:
    default: '0.10'
    choice: []
    unit:
    description: Minimaler Preis
    help: Niedrigster Preis, typisch zur Mittagszeit (kann negativ sein)
    advanced: false
    optional: true
  - name: max
    example:
    default: 0.39
    choice: []
    unit:
    description: Maximaler Preis
    help: Höchster Preis, typisch am Abend
    advanced: false
    optional: true
  - name: noise
    example:
    default: 0.01
    choice: []
    unit:
    description: Preisschwankung
    help: Zufällige Schwankung pro Slot (±Wert)
    advanced: true
    optional: true
  - name: charges
    example:
    default:
    choice: []
    unit:
    description: Aufschlag
    help: Zusätzlicher fester Aufschlag pro kWh
    advanced: true
    optional: true
  - name: chargesZones
    example:
    default:
    choice: []
    unit:
    description: Aufschlagszonen
    help: Zeitabhängige Aufschläge, die den Standardaufschlag überschreiben.
    advanced: true
    optional: true
  - name: tax
    example:
    default:
    choice: []
    unit:
    description: Steuer
    help: Zusätzlicher prozentualer Aufschlag (z.B. 0.2 für 20%)
    advanced: true
    optional: true
  - name: formula
    example: math.Max((price + charges) * (1 + tax), 0.0)
    default:
    choice: []
    unit:
    description: Formel
    help: Individuelle Formel zur Berechnung des Preises
    advanced: true
    optional: true