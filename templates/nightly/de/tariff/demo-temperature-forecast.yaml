template: demo-temperature-forecast
product:
  identifier: demo-temperature-forecast
  description: Demo Temperatur-Vorhersage
  group: Temperaturvorhersage
requirements: ["skiptest"]
description: |
  Zu Demonstrationszwecken. Liefert Außentemperaturdaten basierend auf einem typischen Tagesverlauf.
render:
  - default: |
      type: template
      template: demo-temperature-forecast
      min: 10 # Minimale Temperatur (°C), optional
      max: 20 # Maximale Temperatur (°C), optional
params:
  - name: min
    example:
    default: 10
    choice: []
    unit: °C
    description: Minimale Temperatur
    help:
    advanced: false
    optional: true
  - name: max
    example:
    default: 20
    choice: []
    unit: °C
    description: Maximale Temperatur
    help:
    advanced: false
    optional: true