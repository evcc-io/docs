template: pvnode-v2
product:
  identifier: pvnode-v2-api
  brand: pvnode V2 API
  group: PV Vorhersage
requirements: ["skiptest"]
description: |
  [pvnode V2 API](https://pvnode.com) liefert 15-Minuten PV Vorhersagen per REST API Version 2 mit Standort-ID und leichter Konfiguration über Web-App
  Ein API-Key ist erforderlich (kostenloser Plan möglich)
  **Achtung**: Mit dem kostenlosen Plan ist nur ein Standort (fest) möglich mit einer Prognose für Heute & Morgen und nur einem Update pro Tag und 250 gecached Abfragen.

render:
  - default: |
      type: template
      template: pvnode-v2
      site_id: # Standort-ID
      apikey: # pvnode API Key
    advanced: |
      type: template
      template: pvnode-v2
      site_id: # Standort-ID
      apikey: # pvnode API Key
      forecast_days: 1 # Vorhersagetage, Der kostenlose Plan von pvnode erlaubt nur 1 Vorhersagetag (1 = heute + morgen). (optional)
params:
  - name: site_id
    example:
    default:
    choice: []
    unit:
    description: Standort-ID
    help:
    advanced: false
    optional: false
  - name: apikey
    example:
    default:
    choice: []
    unit:
    description: pvnode API Key
    help:
    advanced: false
    optional: false
  - name: forecast_days
    example:
    default: 1
    choice: []
    unit:
    description: Vorhersagetage
    help: Der kostenlose Plan von pvnode erlaubt nur 1 Vorhersagetag (1 = heute + morgen).
    advanced: true
    optional: true