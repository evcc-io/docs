template: fixed-zones
product:
  identifier: time-based-tariff
  description: Zeitabhängiger Tarif
  group: Dynamischer Strompreis
description: |
  Zeitabhängige Strompreise mit verschiedenen Preiszonen für Nachttarife, Wochenendtarife oder saisonale Tarife. Wenn sich Zonen überschneiden, gilt die zuletzt zutreffende Zone.
render:
  - default: |
      type: template
      template: fixed-zones
      price: # Standardpreis, Wenn keine Zone zutrifft
      zones: # Preiszonen
    advanced: |
      type: template
      template: fixed-zones
      price: # Standardpreis, Wenn keine Zone zutrifft
      zones: # Preiszonen
      charges: # Aufschlag, Zusätzlicher fester Aufschlag pro kWh (optional)
      chargesZones: # Aufschlagszonen, Zeitabhängige Aufschläge, die den Standardaufschlag überschreiben. (optional)
      tax: # Steuer, Zusätzlicher prozentualer Aufschlag (z.B. 0.2 für 20%) (optional)
      formula: math.Max((price + charges) * (1 + tax), 0.0) # Formel, Individuelle Formel zur Berechnung des Preises (optional)
