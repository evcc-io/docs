template: fnn-eebus
product:
  identifier: fnn-steuerbox-via-eebus-lpcandlpp-ss-14a-enwg-ss-9-eeg
  description: FNN-Steuerbox via EEBus LPC&LPP (§ 14a EnWG, § 9 EEG)
render:
  - default: |
      type: template
      template: fnn-eebus
      ski: # Identifikationsschlüssel (SKI), SKI der FNN-Steuerbox (im Webinterface der Steuerbox einsehbar)
      ip: 192.0.2.2 # IP-Adresse, optional
    advanced: |
      type: template
      template: fnn-eebus
      ski: # Identifikationsschlüssel (SKI), SKI der FNN-Steuerbox (im Webinterface der Steuerbox einsehbar)
      ip: 192.0.2.2 # IP-Adresse, optional
      consumptionnominalmax: # Max. Bezugsleistung (Netzanschluss) (W), Vertragliche Gesamtmaximalleistung des Netzanschlusspunkts, die der Steuerbox gemeldet wird. Dies ist die mit dem Netzbetreiber vereinbarte Anschlusskapazität, NICHT die SteuVE-Mindestleistung (Pmin). Standard 24,15 kVA (3x35A). (optional)
      failsafeconsumptionpower: # Failsafe-Bezugsgrenze der SteuVE (Pmin) (W), Verbleibende Mindestbezugsleistung (Pmin) für steuerbare Verbrauchseinrichtungen, die bei ausbleibendem Heartbeat der Steuerbox angewendet wird. Dies ist die per GZF berechnete Mindestbezugsleistung nach BK6-22-300; wird von der Steuerbox überschrieben, sobald diese eigene Failsafe-Werte überträgt. (Standard 4,2 kW nach § 14a EnWG) (optional)
      productionnominalmax: # Installierte Generatorleistung (Wp) (W), Gesamtnennleistung bzw. Modul- oder Generatorleistung der Anlage (Bezugsgröße nach § 9 EEG). (optional)
      failsafeproductionpower: # Failsafe-Einspeisebegrenzung (W), Verbleibende maximale Einspeiseleistung, die bei verlorenem Heartbeat der Steuerbox angewendet wird. Initialwert; wird von der Steuerbox überschrieben, sobald diese eigene Failsafe-Werte überträgt. (optional)
      failsafeduration: # Failsafe-Mindestdauer, Mindestdauer, für die der Failsafe-Wert nach Aktivierung gehalten wird. Initialwert (Standard 2h); wird von der Steuerbox überschrieben, sobald diese einen eigenen Wert überträgt. (optional)
      passthroughpin: # Passthrough GPIO-Pin (SteuVE dimmen), Ausgangspin, der das aktive Dimmsignal an ein externes System weiterleitet (optional)
