template: homeassistant
product:
  identifier: home-assistant
  brand: Home Assistant
  group: Generische Unterstützung
description: |
  Home Assistant Instanzen in deinem Netzwerk werden automatisch erkannt und passende Entitäten und Services (z.B. `sensor.*`) werden vorgeschlagen.
render:
  - default: |
      type: template
      template: homeassistant
      uri: http://homeassistant.local:8123 # Home Assistant URI
      soc: sensor.vehicle_soc # Ladezustand [%], Entitäts-ID für den Batterie-Ladezustand des Fahrzeugs in Prozent
      title: # Titel, Wird in der Benutzeroberfläche angezeigt (optional)
      capacity: 50 # Akkukapazität (kWh), optional
      range: sensor.vehicle_range # Restreichweite [km], Entitäts-ID für die verbleibende Reichweite des Fahrzeugs in Kilometern (optional)
      status: sensor.vehicle_charging # Ladestatus, Entitäts-ID für Ladestatus (A=getrennt, B=verbunden, C=laden) (optional)
      limitSoc: number.vehicle_target_state_of_charge # Ziel-Ladezustand [%], Entitäts-ID für den Ziel-Ladezustand des Fahrzeugs in Prozent (`number` oder `input_number` Entität) (optional)
      odometer: sensor.vehicle_odometer # Kilometerstand [km], Entitäts-ID für den Kilometerstand des Fahrzeugs (optional)
      climater: binary_sensor.vehicle_climater # Klimatisierung aktiv, Entitäts-ID für den Klimatisierungsstatus des Fahrzeugs (`binary_sensor` mit `on`/`off` Zustand) (optional)
      finishTime: sensor.vehicle_finish_time # Ladeende, Entitäts-ID für die geschätzte Ladeendzeit (ISO8601 oder Unix-Zeitstempel) (optional)
      start_charging: script.vehicle_start_charge; switch.vehicle_charger # Service zum Laden starten, Entitäts-ID für ein Skript oder einen Schalter zum Starten des Ladevorgangs. Nur sinnvoll mit der [Fahrzeug-API Ladesteuerung](https://docs.evcc.io/docs/devices/chargers#vehicle-api-only-charger). Wenn ein Schalter angegeben wird, muss der Service zum Stoppen des Ladens leer bleiben. (optional)
      stop_charging: script.vehicle_stop_charge # Service zum Laden stoppen, Entitäts-ID für ein Skript zum Stoppen des Ladevorgangs. Nur sinnvoll mit der [Fahrzeug-API Ladesteuerung](https://docs.evcc.io/docs/devices/chargers#vehicle-api-only-charger). (optional)
      wakeup: script.vehicle_wakeup; button.wakeup_vehicle # Service zum Aufwecken, Entitäts-ID für ein Skript oder einen Schalter zum Aufwecken des Fahrzeugs (optional)
      setMaxCurrent: number.vehicle_charging_current # Ladestromstärke setzen [A], Entitäts-ID zum Setzen der maximalen Ladestromstärke in Ampere (`number` oder `input_number` Entität) (optional)
    advanced: |
      type: template
      template: homeassistant
      uri: http://homeassistant.local:8123 # Home Assistant URI
      soc: sensor.vehicle_soc # Ladezustand [%], Entitäts-ID für den Batterie-Ladezustand des Fahrzeugs in Prozent
      title: # Titel, Wird in der Benutzeroberfläche angezeigt (optional)
      capacity: 50 # Akkukapazität (kWh), optional
      range: sensor.vehicle_range # Restreichweite [km], Entitäts-ID für die verbleibende Reichweite des Fahrzeugs in Kilometern (optional)
      status: sensor.vehicle_charging # Ladestatus, Entitäts-ID für Ladestatus (A=getrennt, B=verbunden, C=laden) (optional)
      limitSoc: number.vehicle_target_state_of_charge # Ziel-Ladezustand [%], Entitäts-ID für den Ziel-Ladezustand des Fahrzeugs in Prozent (`number` oder `input_number` Entität) (optional)
      odometer: sensor.vehicle_odometer # Kilometerstand [km], Entitäts-ID für den Kilometerstand des Fahrzeugs (optional)
      climater: binary_sensor.vehicle_climater # Klimatisierung aktiv, Entitäts-ID für den Klimatisierungsstatus des Fahrzeugs (`binary_sensor` mit `on`/`off` Zustand) (optional)
      finishTime: sensor.vehicle_finish_time # Ladeende, Entitäts-ID für die geschätzte Ladeendzeit (ISO8601 oder Unix-Zeitstempel) (optional)
      start_charging: script.vehicle_start_charge; switch.vehicle_charger # Service zum Laden starten, Entitäts-ID für ein Skript oder einen Schalter zum Starten des Ladevorgangs. Nur sinnvoll mit der [Fahrzeug-API Ladesteuerung](https://docs.evcc.io/docs/devices/chargers#vehicle-api-only-charger). Wenn ein Schalter angegeben wird, muss der Service zum Stoppen des Ladens leer bleiben. (optional)
      stop_charging: script.vehicle_stop_charge # Service zum Laden stoppen, Entitäts-ID für ein Skript zum Stoppen des Ladevorgangs. Nur sinnvoll mit der [Fahrzeug-API Ladesteuerung](https://docs.evcc.io/docs/devices/chargers#vehicle-api-only-charger). (optional)
      wakeup: script.vehicle_wakeup; button.wakeup_vehicle # Service zum Aufwecken, Entitäts-ID für ein Skript oder einen Schalter zum Aufwecken des Fahrzeugs (optional)
      setMaxCurrent: number.vehicle_charging_current # Ladestromstärke setzen [A], Entitäts-ID zum Setzen der maximalen Ladestromstärke in Ampere (`number` oder `input_number` Entität) (optional)
      icon: car # Icon, Wird in der Benutzeroberfläche angezeigt [car, bike, bus, moped, motorcycle, rocket, scooter, taxi, tractor, rickshaw, shuttle, van, airpurifier, battery, bulb, climate, coffeemaker, compute, cooking, cooler, desktop, device, dishwasher, dryer, floorlamp, generic, heater, heatexchange, heatpump, kettle, laundry, laundry2, machine, meter, microwave, pump, smartconsumer, tool, waterheater] (optional)
      phases: 3 # Maximale Phasenanzahl, Die maximale Anzahl der Phasen welche genutzt werden können (optional)
      mode: # Standardlademodus, Wird beim Anschließen eines Fahrzeugs verwendet. Möglich sind Off, Now, MinPV und PV, oder leer wenn keiner definiert werden soll (optional)
      minCurrent: 6 # Minimale Stromstärke (A), Definiert die minimale Stromstärke pro angeschlossener Phase die genutzt werden kann (optional)
      maxCurrent: 16 # Maximale Stromstärke (A), Definiert die maximale Stromstärke pro angeschlossener Phase die genutzt werden kann (optional)
      maxPower: # Ladeleistungs-Hinweis (W), Definiert die maximale Ladeleistung des Fahrzeugs. Hilft, die Ladeplanung zu verbessern, wenn das Fahrzeug üblicherweise weniger Strom nutzt als angeboten oder höhere Ströme bei einphasigem Laden erlaubt als bei dreiphasigem. _Der bereitgestellte Strom des Ladepunktes wird nicht beeinflusst._ (optional)
      identifiers: # Identifikation, Kann meist erst später eingetragen werden, siehe: https://docs.evcc.io/docs/features/vehicle (optional)
      priority: # Priorität, Priorität des Ladepunktes oder Fahrzeugs in Relation zu anderen Ladepunkten oder Fahrzeugen für die Zuweisung von PV-Energie (optional)
      coarsecurrent: # 1A Ladestromvorgabe, Fahrzeug unterstützt nur 1A Schritte der Ladestromvorgabe (optional)
      streaming: true # Unterstützt Streaming, Streaming Datenempfang erfolgt asynchron (optional)
      welcomecharge: # Laden bei Verbindung, Wallbox gibt kurzzeitige Ladefreigabe bei Fahrzeugverbindung. Das ermöglicht es Fahrzeugen, die eine Stromversorgung beim Anschließen benötigen, einen Fehlerzustand zu vermeiden. (optional)
