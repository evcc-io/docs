template: homeassistant
product:
  identifier: home-assistant
  brand: Home Assistant
render:
  - default: |
      type: template
      template: homeassistant
      uri: http://homeassistant.local:8123 # Home Assistant URI
      notify: notify.mobile_app_android # Benachrichtigungsdienst, Home Assistant Benachrichtigungsdienst in der Form `domain.service` (z. B. `notify.mobile_app_android`). Leer lassen, um eine persistente Benachrichtigung in der HA-Oberfläche zu erstellen. (optional)
      critical: false # Kritische Benachrichtigung, Setzt ttl=0 und priority=high für sofortige Zustellung, auch im Energiesparmodus. (optional)
      group: evcc # Benachrichtigungsgruppe, Gruppiert Benachrichtigungen auf dem Gerät. Gleiche Gruppe fasst Meldungen zusammen. (optional)
      notification_channel: alarm_stream # Benachrichtigungskanal, Android-Benachrichtigungskanal (bestimmt Ton und Priorität). Z. B. `alarm_stream` für Alarmton. (optional)
params:
  - name: uri
    example: http://homeassistant.local:8123
    default:
    choice: []
    unit:
    description: Home Assistant URI
    help:
    advanced: false
    optional: false
  - name: notify
    example: notify.mobile_app_android
    default:
    choice: []
    unit:
    description: Benachrichtigungsdienst
    help: Home Assistant Benachrichtigungsdienst in der Form `domain.service` (z. B. `notify.mobile_app_android`). Leer lassen, um eine persistente Benachrichtigung in der HA-Oberfläche zu erstellen.
    advanced: false
    optional: true
  - name: critical
    example:
    default: false
    choice: []
    unit:
    description: Kritische Benachrichtigung
    help: Setzt ttl=0 und priority=high für sofortige Zustellung, auch im Energiesparmodus.
    advanced: false
    optional: true
  - name: group
    example: evcc
    default:
    choice: []
    unit:
    description: Benachrichtigungsgruppe
    help: Gruppiert Benachrichtigungen auf dem Gerät. Gleiche Gruppe fasst Meldungen zusammen.
    advanced: false
    optional: true
  - name: notification_channel
    example: alarm_stream
    default:
    choice: []
    unit:
    description: Benachrichtigungskanal
    help: Android-Benachrichtigungskanal (bestimmt Ton und Priorität). Z. B. `alarm_stream` für Alarmton.
    advanced: false
    optional: true