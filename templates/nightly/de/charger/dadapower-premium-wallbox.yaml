template: dadapower
product:
  identifier: dadapower-premium-wallbox
  brand: Dadapower
  description: Premium Wallbox
capabilities: ["mA", "rfid", "1p3p", "meter", "dim"]
requirements: ["sponsorship"]
render:
  - default: |
      type: template
      template: dadapower

      # Modbus TCP
      modbus: tcpip
      id: 1
      host:  # Hostname
      port: 502 # Port
params:
  - name: modbus
    example:
    default:
    choice: ['tcpip']
    unit:
    description: Modbus Typ
    help:
    advanced: false
    optional: false
modbus:
  host:
  id: 1
  modbus: tcpip
  port: 502
  tcpip: true