template: openwb
product:
  identifier: openwb-series2
  brand: openWB
  description: series2
description: |
  Die Wallbox muss als Ladepunkt konfiguriert sein.
render:
  - default: |
      type: template
      template: openwb
      host: 192.0.2.2 # IP-Adresse oder Hostname
    advanced: |
      type: template
      template: openwb
      host: 192.0.2.2 # IP-Adresse oder Hostname
      connector: 1 # Anschlussnummer, Bei Ladestationen mit mehreren Anschlüssen. Zählung beginnt bei 1. (optional)
      phases1p3p: false # Phasenumschaltung vorhanden, optional
params:
  - name: host
    example: 192.0.2.2
    default:
    choice: []
    unit:
    description: IP-Adresse oder Hostname
    help:
    advanced: false
    optional: false
  - name: connector
    example:
    default: 1
    choice: []
    unit:
    description: Anschlussnummer
    help: Bei Ladestationen mit mehreren Anschlüssen. Zählung beginnt bei 1.
    advanced: true
    optional: true
  - name: phases1p3p
    example:
    default: false
    choice: []
    unit:
    description: Phasenumschaltung vorhanden
    help:
    advanced: true
    optional: true