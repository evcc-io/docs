template: ghost
product:
  identifier: kontron-solar-charger
  brand: Kontron Solar
  description: Charger
capabilities: ["iso151182", "mA", "rfid", "1p3p", "meter"]
description: |
  Das PV-Überschussladen der Wallbox muss deaktiviert sein (Ladeverwaltung -> Ladeeinstellungen -> PV-Überschussladen aus).

  Für Phasenumschaltung und RFID-Identifikation werden IP-Adresse und Techniker-Passwort benötigt. Die Phasenumschaltung sollte in der Wallbox aktiviert werden (Ladeverwaltung -> Ladeeinstellungen).

render:
  - default: |
      type: template
      template: ghost
      ski: # Identifikationsschlüssel (SKI), Üblicherweise im Web Interface der Wallbox zu finden
      ip: 192.0.2.2 # IP-Adresse, IP-Adresse der Wallbox. Erforderlich für Phasenumschaltung und RFID-Identifikation. (optional)
      password: # Passwort, Techniker-Passwort. Erforderlich für Phasenumschaltung und RFID-Identifikation. (optional)
params:
  - name: ski
    example:
    default:
    choice: []
    unit:
    description: Identifikationsschlüssel (SKI)
    help: Üblicherweise im Web Interface der Wallbox zu finden
    advanced: false
    optional: false
  - name: ip
    example: 192.0.2.2
    default:
    choice: []
    unit:
    description: IP-Adresse
    help: IP-Adresse der Wallbox. Erforderlich für Phasenumschaltung und RFID-Identifikation.
    advanced: false
    optional: true
  - name: password
    example:
    default:
    choice: []
    unit:
    description: Passwort
    help: Techniker-Passwort. Erforderlich für Phasenumschaltung und RFID-Identifikation.
    advanced: false
    optional: true