template: solvis
product:
  identifier: solvis-solviscontrol-2-3
  brand: Solvis
  description: SolvisControl 2/3
  group: Wärmeerzeuger
capabilities: ["meter"]
description: |
  Modbus TCP muss am SolvisControl unter „Einstellungen / Netzwerk“ aktiviert sein.
  Die Ansteuerung erfolgt über die Warmwasser-Solltemperatur.
  Eine Leistungsreduzierung (dim) unterstützt der Regler nicht.

render:
  - default: |
      type: template
      template: solvis
      host: 192.0.2.2 # IP-Adresse oder Hostname
      tempsource: warmwater # Temperaturquelle, [warmwater, buffer]
      port: 502 # Port, optional
      tempnormal: 48 # Solltemperatur Normalbetrieb, optional
      tempboost: 60 # Solltemperatur Boost, optional
params:
  - name: host
    example: 192.0.2.2
    default:
    choice: []
    unit:
    description: IP-Adresse oder Hostname
    help:
    advanced: false
    optional: false
  - name: tempsource
    example:
    default: warmwater
    choice: ['warmwater', 'buffer']
    unit:
    description: Temperaturquelle
    help:
    advanced: false
    optional: false
  - name: port
    example:
    default: 502
    choice: []
    unit:
    description: Port
    help:
    advanced: false
    optional: true
  - name: tempnormal
    example:
    default: 48
    choice: []
    unit:
    description: Solltemperatur Normalbetrieb
    help:
    advanced: false
    optional: true
  - name: tempboost
    example:
    default: 60
    choice: []
    unit:
    description: Solltemperatur Boost
    help:
    advanced: false
    optional: true