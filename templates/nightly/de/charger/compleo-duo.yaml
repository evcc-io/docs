template: compleo-duo
product:
  identifier: compleo-duo
  brand: Compleo
  description: Duo
capabilities: ["mA", "rfid", "1p3p"]
requirements: ["sponsorship"]
render:
  - default: |
      type: template
      template: compleo-duo

      # Modbus TCP
      modbus: tcpip
      id: 1
      host:  # Hostname
      port: 502 # Port
    advanced: |
      type: template
      template: compleo-duo

      # Modbus TCP
      modbus: tcpip
      id: 1
      host:  # Hostname
      port: 502 # Port
      connector: 1 # Anschlussnummer, Bei Ladestationen mit mehreren Anschlüssen. Zählung beginnt bei 1. (optional)
params:
  - name: modbus
    example:
    default:
    choice: ['tcpip']
    unit:
    description: Modbus Typ
    help:
    advanced: false
    optional: false
  - name: connector
    example:
    default: 1
    choice: []
    unit:
    description: Anschlussnummer
    help: Bei Ladestationen mit mehreren Anschlüssen. Zählung beginnt bei 1.
    advanced: true
    optional: true
modbus:
  host:
  id: 1
  modbus: tcpip
  port: 502
  tcpip: true