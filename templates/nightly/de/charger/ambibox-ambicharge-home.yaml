template: ambibox
product:
  identifier: ambibox-ambicharge-home
  brand: Ambibox
  description: ambiCHARGE Home
capabilities: ["iso151182", "mA", "meter"]
requirements: ["sponsorship"]
render:
  - default: |
      type: template
      template: ambibox

      # Modbus TCP
      modbus: tcpip
      id: 1
      host:  # Hostname
      port: 502 # Port
    advanced: |
      type: template
      template: ambibox

      # Modbus TCP
      modbus: tcpip
      id: 1
      host:  # Hostname
      port: 502 # Port
      connector: 1 # Anschlussnummer, Bei Ladestationen mit mehreren Anschlüssen. Zählung beginnt bei 1. (optional)
params:
  - name: modbus
    example:
    default:
    choice: ['tcpip']
    unit:
    description: Modbus Typ
    help:
    advanced: false
    optional: false
  - name: connector
    example:
    default: 1
    choice: []
    unit:
    description: Anschlussnummer
    help: Bei Ladestationen mit mehreren Anschlüssen. Zählung beginnt bei 1.
    advanced: true
    optional: true
modbus:
  delay:
  host:
  id: 1
  modbus: tcpip
  port: 502
  tcpip: true
  timeout: