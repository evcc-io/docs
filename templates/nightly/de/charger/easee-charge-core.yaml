template: easee
product:
  identifier: easee-charge-core
  brand: Easee
  description: Charge Core
capabilities: ["rfid", "1p3p", "meter", "dim"]
requirements: ["sponsorship"]
caveats:
  - description: |
      Seltene Energie-Updates können Ladehistorie und Sitzungsstatistik verfälschen.
    link: https://github.com/evcc-io/evcc/issues/20594
  - description: |
      Bei mehreren Ladepunkten in einem Easee-Circuit wirkt die Phasenumschaltung auf alle Ladepunkte.
    link: https://github.com/evcc-io/evcc/issues/28859
render:
  - default: |
      type: template
      template: easee
      user: # Benutzerkonto, Emailadresse
      password: # Passwort, wie Login für Easee App oder Web Portal ([easee.cloud](https://easee.cloud))
      charger: EH______ # Charger Seriennummer
      timeout: 20s # Zeitüberschreitung, Spezifisches Timeout für Easee API Interaktionen. Kann Warnungen und Fehler bei träger Easee API reduzieren. (optional)
      authorize: # Authentifizierung aktiviert, Steuert ob evcc die Authentifizierung am Charger vornimmt. Vorteil ist ein kontrollierter Ladestart. Nicht kompatibel mit RFID Identifikation von Fahrzeugen. (optional)
params:
  - name: user
    example:
    default:
    choice: []
    unit:
    description: Benutzerkonto
    help: Emailadresse
    advanced: false
    optional: false
  - name: password
    example:
    default:
    choice: []
    unit:
    description: Passwort
    help: wie Login für Easee App oder Web Portal ([easee.cloud](https://easee.cloud))
    advanced: false
    optional: false
  - name: charger
    example: EH______
    default:
    choice: []
    unit:
    description: Charger Seriennummer
    help:
    advanced: false
    optional: false
  - name: timeout
    example: 10s
    default: 20s
    choice: []
    unit:
    description: Zeitüberschreitung
    help: Spezifisches Timeout für Easee API Interaktionen. Kann Warnungen und Fehler bei träger Easee API reduzieren.
    advanced: false
    optional: true
  - name: authorize
    example:
    default:
    choice: []
    unit:
    description: Authentifizierung aktiviert
    help: Steuert ob evcc die Authentifizierung am Charger vornimmt. Vorteil ist ein kontrollierter Ladestart. Nicht kompatibel mit RFID Identifikation von Fahrzeugen.
    advanced: false
    optional: true