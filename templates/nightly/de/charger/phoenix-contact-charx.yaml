template: phoenix-charx
product:
  identifier: phoenix-contact-charx
  brand: Phoenix Contact
  description: CHARX
render:
  - default: |
      type: template
      template: phoenix-charx

      # Modbus TCP
      modbus: tcpip
      id: 255
      host:  # Hostname
      port: 502 # Port
    advanced: |
      type: template
      template: phoenix-charx

      # Modbus TCP
      modbus: tcpip
      id: 255
      host:  # Hostname
      port: 502 # Port
      connector: 1 # Anschlussnummer, Bei Ladestationen mit mehreren Anschlüssen. Zählung beginnt bei 1. (optional)
params:
  - name: modbus
    example:
    default:
    choice: ['tcpip']
    unit:
    description: Modbus Typ
    help:
    advanced: false
    optional: false
  - name: connector
    example:
    default: 1
    choice: []
    unit:
    description: Anschlussnummer
    help: Bei Ladestationen mit mehreren Anschlüssen. Zählung beginnt bei 1.
    advanced: true
    optional: true
modbus:
  host:
  id: 255
  modbus: tcpip
  port: 502
  tcpip: true