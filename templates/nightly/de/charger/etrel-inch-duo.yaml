template: etrel-duo
product:
  identifier: etrel-inch-duo
  brand: Etrel
  description: INCH Duo
capabilities: ["mA"]
requirements: ["sponsorship"]
description: |
  Die Wallbox muss sich im "Power" Modus befinden.
render:
  - default: |
      type: template
      template: etrel-duo
      host: 192.0.2.2 # IP-Adresse oder Hostname
      port: 502 # Port, optional
    advanced: |
      type: template
      template: etrel-duo
      host: 192.0.2.2 # IP-Adresse oder Hostname
      port: 502 # Port, optional
      connector: 1 # Anschlussnummer, Bei Ladestationen mit mehreren Anschlüssen. Zählung beginnt bei 1. (optional)
params:
  - name: host
    example: 192.0.2.2
    default:
    choice: []
    unit:
    description: IP-Adresse oder Hostname
    help:
    advanced: false
    optional: false
  - name: port
    example:
    default: 502
    choice: []
    unit:
    description: Port
    help:
    advanced: false
    optional: true
  - name: connector
    example:
    default: 1
    choice: []
    unit:
    description: Anschlussnummer
    help: Bei Ladestationen mit mehreren Anschlüssen. Zählung beginnt bei 1.
    advanced: true
    optional: true