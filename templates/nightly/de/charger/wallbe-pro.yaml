template: phoenix-ev-eth
product:
  identifier: wallbe-pro
  brand: Wallbe
  description: Pro
capabilities: ["mA", "rfid", "dim"]
requirements: ["sponsorship"]
description: |
  DIP Schalter 10 des Controllers muss auf 'ON' gestellt sein. Eine aktuelle Controller-Firmware wird empfohlen.
render:
  - default: |
      type: template
      template: phoenix-ev-eth

      # Modbus TCP
      modbus: tcpip
      id: 255
      host:  # Hostname
      port: 502 # Port
    advanced: |
      type: template
      template: phoenix-ev-eth

      # Modbus TCP
      modbus: tcpip
      id: 255
      host:  # Hostname
      port: 502 # Port
      millicurrentsupported: false # mA-Regelung unterstützt, Erzwingt die mA-Regelung der erweiterten Wallbe-Firmware, falls die automatische Erkennung fehlschlägt. (optional)
params:
  - name: modbus
    example:
    default:
    choice: ['tcpip']
    unit:
    description: Modbus Typ
    help:
    advanced: false
    optional: false
  - name: millicurrentsupported
    example:
    default: false
    choice: []
    unit:
    description: mA-Regelung unterstützt
    help: Erzwingt die mA-Regelung der erweiterten Wallbe-Firmware, falls die automatische Erkennung fehlschlägt.
    advanced: true
    optional: true
modbus:
  host:
  id: 255
  modbus: tcpip
  port: 502
  tcpip: true