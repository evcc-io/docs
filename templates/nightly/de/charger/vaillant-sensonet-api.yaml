template: vaillant
product:
  identifier: vaillant-sensonet-api
  brand: Vaillant
  description: SensoNET (API)
  group: Wärmeerzeuger
description: |
  Die Boost Funktion erwärmt Warmwasser oder eine Boostzone. Die Boostzone wird durch die ID identifiziert. Die Boost Temperatur wird in Grad Celsius angegeben. Ist eine Boost Temperatur angegeben, wird die Boostzone aktiviert, anderenfalls Warmwasser. Achtung, wird der Warmwasser-Betriebsmodus der Anlage auf "Aus" gestellt, damit evcc das Warmwasser vollständig regelt, führt die Anlage ihren wöchentlichen Legionellenschutz nicht mehr aus. Sorge dann selbst für eine regelmäßige Aufheizung auf Desinfektionstemperatur (z. B. per Zeitprogramm oder erzwungenem Boost).
render:
  - default: |
      type: template
      template: vaillant
      user: # Benutzerkonto, bspw. E-Mail Adresse, User Id, etc. (optional)
      password: # Passwort, Zugangspasswort des Dienstes (optional)
      realm: germany # Region, [albania, austria, belgium, bosnia, bulgaria, croatia, cyprus, czechrepublic, denmark, estonia, finland, france, georgia, germany, greece, hungary, ireland, italy, kosovo, latvia, lithuania, luxembourg, moldavia, netherlands, new-zealand, north-macedonia, norway, poland, portugal, romania, serbia, slovakia, slovenia, spain, sweden, switzerland, turkiye, ukraine, unitedkingdom, uzbekistan] (optional)
      zone: # ID der Boostzone, optional
      setpoint: # Boost Temperatur, optional
      system: # Name der Anlage, Notwendig falls mehrere Anlagen im Account vorhanden sind (optional)
    advanced: |
      type: template
      template: vaillant
      user: # Benutzerkonto, bspw. E-Mail Adresse, User Id, etc. (optional)
      password: # Passwort, Zugangspasswort des Dienstes (optional)
