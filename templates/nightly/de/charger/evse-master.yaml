template: evsemaster-udp
product:
  identifier: evse-master
  brand: EVSE Master
requirements: ["sponsorship", "skiptest"]
description: |
  Die Ladestation und evcc müssen sich im selben Netzwerksegment (VLAN) befinden, da die Erkennung über UDP-Broadcast erfolgt. Broadcasts werden von den meisten Routern nicht zwischen VLANs weitergeleitet.

render:
  - default: |
      type: template
      template: evsemaster-udp
      serial: '0906252400004617' # Seriennummer (16-stellige Hex-Zeichenkette), Die Seriennummer steht auf dem Typenschild der Ladestation (8 Byte als Hex).
      password: # Passwort (wie in der EVSE Master App gesetzt), Das Passwort wird in der EVSE Master App unter Geräteeinstellungen konfiguriert. App und evcc dürfen nicht gleichzeitig verbunden sein.
params:
  - name: serial
    example: '0906252400004617'
    default:
    choice: []
    unit:
    description: Seriennummer (16-stellige Hex-Zeichenkette)
    help: Die Seriennummer steht auf dem Typenschild der Ladestation (8 Byte als Hex).
    advanced: false
    optional: false
  - name: password
    example:
    default:
    choice: []
    unit:
    description: Passwort (wie in der EVSE Master App gesetzt)
    help: Das Passwort wird in der EVSE Master App unter Geräteeinstellungen konfiguriert. App und evcc dürfen nicht gleichzeitig verbunden sein.
    advanced: false
    optional: false