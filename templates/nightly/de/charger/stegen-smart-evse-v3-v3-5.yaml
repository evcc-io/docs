template: smart-evse
product:
  identifier: stegen-smart-evse-v3-v3-5
  brand: Stegen
  description: Smart Evse v3 / v3.5
capabilities: ["mA", "rfid", "1p3p"]
requirements: ["sponsorship"]
description: |
  Anbindung über die REST API der Smart Evse Firmware (FW >= 3.6.0).
  evcc setzt das Gerät in den NORMAL Modus und steuert den Ladestrom über `override_current`.

render:
  - default: |
      type: template
      template: smart-evse
      host: 192.0.2.2 # IP-Adresse oder Hostname
    advanced: |
      type: template
      template: smart-evse
      host: 192.0.2.2 # IP-Adresse oder Hostname
      cache: 1s # Cache, Zeitintervall für erneute Datenabfrage (optional)
params:
  - name: host
    example: 192.0.2.2
    default:
    choice: []
    unit:
    description: IP-Adresse oder Hostname
    help:
    advanced: false
    optional: false
  - name: cache
    example: 5m
    default: 1s
    choice: []
    unit:
    description: Cache
    help: Zeitintervall für erneute Datenabfrage
    advanced: true
    optional: true