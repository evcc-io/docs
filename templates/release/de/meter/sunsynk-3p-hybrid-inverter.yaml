params:
  - name: modbus
    example:
    default:
    choice: ['rs485', 'tcpip']
    unit:
    description: Modbus Typ
    help:
    advanced: false
    optional: false
  - name: batterytype
    example:
    default: lv
    choice: ['lv', 'hv']
    unit:
    description: Wechselrichter für LV- oder HV-Batterie
    help: '"hv" für eine Hochvolt-Batterie mit Nennspannung über 60V verwenden'
    advanced: false
    optional: false
  - name: maxdischargecurrent
    example:
    default: 100
    choice: []
    unit:
    description: Max Entladestrom
    help: 'Maximaler Batterieentladestrom in Ampere (A) für Normalmodus. Typischer Bereich 50-350A abhängig von Batteriekapazität. Leistungsberechnung: P(W) = Strom(A) x Spannung(V). Beispiel mit 48V Batterie: 100A x 48V = 4800W (4,8kW).'
    advanced: false
    optional: false
  - name: gridchargecurrent
    example:
    default: 60
    choice: []
    unit:
    description: Netzladestrom
    help: 'Maximaler Batterieladestrom in Ampere (A) aus dem Netz für Lademodus. Typischer Bereich 30-350A abhängig von Batterie- und Wechselrichterkapazität. Leistungsberechnung: P(W) = Strom(A) x Spannung(V). Beispiel mit 48V Batterie: 60A x 48V = 2880W (2,9kW).'
    advanced: false
    optional: false
  - name: capacity
    example: 50
    default:
    choice: []
    unit: kWh
    description: Akkukapazität
    help:
    advanced: false
    optional: true
  - name: minsoc
    example: 25
    default:
    choice: []
    unit: '%'
    description: Minimaler Ladestand
    help: Untere Grenze beim Entladen der Batterie im normalen Betrieb
    advanced: false
    optional: true
  - name: maxsoc
    example: 95
    default:
    choice: []
    unit: '%'
    description: Maximaler Ladestand
    help: Oberes Limit beim Laden der Batterie aus dem Netz
    advanced: false
    optional: true
  - name: maxacpower
    example: 5000
    default: 0
    choice: []
    unit: W
    description: Maximale AC Leistung des Hybrid-Wechselrichters
    help:
    advanced: true
    optional: true
  - name: storageunit
    example:
    default: 1
    choice: ['1', '2']
    unit:
    description: Nummer des Batteriespeichers
    help:
    advanced: true
    optional: true
  - name: maxchargepower
    example:
    default:
    choice: []
    unit: W
    description: Maximale Ladeleistung
    help: Für erzwungenes Laden des Speichers.
    advanced: true
    optional: true
  - name: maxdischargepower
    example:
    default:
    choice: []
    unit: W
    description: Maximale Entladeleistung
    help: Maximale Entladeleistung des Speichers.
    advanced: true
    optional: true
