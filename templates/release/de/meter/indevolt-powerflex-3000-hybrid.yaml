template: indevolt-hybrid
product:
  identifier: indevolt-powerflex-3000-hybrid
  brand: Indevolt
  description: PowerFlex 3000 Hybrid
description: |
  Lokaler Direktzugriff auf Indevolt-Geräte (z.B. Solidflex-Serie) per HTTP API auf Port 8080.

  Die IP-Adresse des Geräts kann in der Indevolt-App, im Router oder per UDP-Broadcast (Port 10000) ermittelt werden. Es empfiehlt sich, dem Gerät im Router eine feste IP zuzuweisen.

  Vorzeichenkonvention der Batterieleistung sowie Verfügbarkeit eines Netzbezugs-/-einspeisepunktes (Register 2101/2108) hängen von der Installation (CT-Klemme) ab und sind ggf. zu prüfen.

  Siehe [docs.indevolt.com](https://docs.indevolt.com/docs/hardware/geek/open-data/).

render:
  - usage: grid
    default: |
      type: template
      template: indevolt-hybrid
      usage: grid
      host: 192.0.2.2 # IP-Adresse oder Hostname
    advanced: |
      type: template
      template: indevolt-hybrid
      usage: grid
      host: 192.0.2.2 # IP-Adresse oder Hostname
      user: # Benutzerkonto, bspw. E-Mail Adresse, User Id, etc. (optional)
      password: # Passwort, Zugangspasswort des Dienstes (optional)
      cache: 5s # Cache, Zeitintervall für erneute Datenabfrage (optional)
  - usage: pv
    default: |
      type: template
      template: indevolt-hybrid
      usage: pv
      host: 192.0.2.2 # IP-Adresse oder Hostname
    advanced: |
      type: template
      template: indevolt-hybrid
      usage: pv
      host: 192.0.2.2 # IP-Adresse oder Hostname
      user: # Benutzerkonto, bspw. E-Mail Adresse, User Id, etc. (optional)
      password: # Passwort, Zugangspasswort des Dienstes (optional)
      cache: 5s # Cache, Zeitintervall für erneute Datenabfrage (optional)
  - usage: battery
    default: |
      type: template
      template: indevolt-hybrid
      usage: battery
      host: 192.0.2.2 # IP-Adresse oder Hostname
      capacity: 50 # Akkukapazität (kWh), optional
      minsoc: 25 # Minimaler Ladestand (%), Untere Grenze beim Entladen der Batterie im normalen Betrieb (optional)
      maxsoc: 95 # Maximaler Ladestand (%), Oberes Limit beim Laden der Batterie aus dem Netz (optional)
    advanced: |
      type: template
      template: indevolt-hybrid
      usage: battery
      host: 192.0.2.2 # IP-Adresse oder Hostname
      capacity: 50 # Akkukapazität (kWh), optional
      minsoc: 25 # Minimaler Ladestand (%), Untere Grenze beim Entladen der Batterie im normalen Betrieb (optional)
      maxsoc: 95 # Maximaler Ladestand (%), Oberes Limit beim Laden der Batterie aus dem Netz (optional)
      user: # Benutzerkonto, bspw. E-Mail Adresse, User Id, etc. (optional)
      password: # Passwort, Zugangspasswort des Dienstes (optional)
      cache: 5s # Cache, Zeitintervall für erneute Datenabfrage (optional)
      maxchargepower: # Maximale Ladeleistung (W), Für erzwungenes Laden des Speichers. (optional)
      maxdischargepower: # Maximale Entladeleistung (W), Maximale Entladeleistung des Speichers. (optional)
