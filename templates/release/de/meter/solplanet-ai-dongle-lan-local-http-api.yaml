template: solplanet-ai-dongle
product:
  identifier: solplanet-ai-dongle-lan-local-http-api
  brand: Solplanet
  description: AI-Dongle LAN (local HTTP API)
description: |
  Nutzt die lokale HTTP-Schnittstelle des AI-Dongle (z.B. BA121T-30) statt Modbus TCP.
  Die Seriennummer (isn) des Wechselrichters kann über `http://<host>:8484/getdev.cgi?device=2` ausgelesen werden.

render:
  - usage: grid
    default: |
      type: template
      template: solplanet-ai-dongle
      usage: grid
      host: 192.0.2.2 # IP-Adresse oder Hostname
      serial: # Seriennummer des Wechselrichters (isn)
    advanced: |
      type: template
      template: solplanet-ai-dongle
      usage: grid
      host: 192.0.2.2 # IP-Adresse oder Hostname
      serial: # Seriennummer des Wechselrichters (isn)
  - usage: pv
    default: |
      type: template
      template: solplanet-ai-dongle
      usage: pv
      host: 192.0.2.2 # IP-Adresse oder Hostname
      serial: # Seriennummer des Wechselrichters (isn)
    advanced: |
      type: template
      template: solplanet-ai-dongle
      usage: pv
      host: 192.0.2.2 # IP-Adresse oder Hostname
      serial: # Seriennummer des Wechselrichters (isn)
  - usage: battery
    default: |
      type: template
      template: solplanet-ai-dongle
      usage: battery
      host: 192.0.2.2 # IP-Adresse oder Hostname
      serial: # Seriennummer des Wechselrichters (isn)
      capacity: 50 # Akkukapazität (kWh), optional
      minsoc: 25 # Minimaler Ladestand (%), Untere Grenze beim Entladen der Batterie im normalen Betrieb (optional)
      maxsoc: 95 # Maximaler Ladestand (%), Oberes Limit beim Laden der Batterie aus dem Netz (optional)
    advanced: |
      type: template
      template: solplanet-ai-dongle
      usage: battery
      host: 192.0.2.2 # IP-Adresse oder Hostname
      serial: # Seriennummer des Wechselrichters (isn)
      capacity: 50 # Akkukapazität (kWh), optional
      minsoc: 25 # Minimaler Ladestand (%), Untere Grenze beim Entladen der Batterie im normalen Betrieb (optional)
      maxsoc: 95 # Maximaler Ladestand (%), Oberes Limit beim Laden der Batterie aus dem Netz (optional)
      maxchargepower: # Maximale Ladeleistung (W), Für erzwungenes Laden des Speichers. (optional)
      maxdischargepower: # Maximale Entladeleistung (W), Maximale Entladeleistung des Speichers. (optional)
