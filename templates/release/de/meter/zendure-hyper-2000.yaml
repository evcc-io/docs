template: zendure-hyper
product:
  identifier: zendure-hyper-2000
  brand: Zendure
  description: Hyper 2000
requirements: ["skiptest"]
render:
  - usage: pv
    default: |
      type: template
      template: zendure-hyper
      usage: pv
      account: dev@zendure.com # Account ID
      serial: VU5D99F74021B04 # Seriennummer, Zu finden in der Zendure App in den Einstellungen des Geräts
      region: EU # Region, [EU, Global]
      timeout: 10s # Zeitüberschreitung, optional
    advanced: |
      type: template
      template: zendure-hyper
      usage: pv
      account: dev@zendure.com # Account ID
      serial: VU5D99F74021B04 # Seriennummer, Zu finden in der Zendure App in den Einstellungen des Geräts
      region: EU # Region, [EU, Global]
      timeout: 10s # Zeitüberschreitung, optional
  - usage: battery
    default: |
      type: template
      template: zendure-hyper
      usage: battery
      account: dev@zendure.com # Account ID
      serial: VU5D99F74021B04 # Seriennummer, Zu finden in der Zendure App in den Einstellungen des Geräts
      region: EU # Region, [EU, Global]
      minsoc: 25 # Minimaler Ladestand (%), Untere Grenze beim Entladen der Batterie im normalen Betrieb (optional)
      maxsoc: 95 # Maximaler Ladestand (%), Oberes Limit beim Laden der Batterie aus dem Netz (optional)
      timeout: 10s # Zeitüberschreitung, optional
    advanced: |
      type: template
      template: zendure-hyper
      usage: battery
      account: dev@zendure.com # Account ID
      serial: VU5D99F74021B04 # Seriennummer, Zu finden in der Zendure App in den Einstellungen des Geräts
      region: EU # Region, [EU, Global]
      minsoc: 25 # Minimaler Ladestand (%), Untere Grenze beim Entladen der Batterie im normalen Betrieb (optional)
      maxsoc: 95 # Maximaler Ladestand (%), Oberes Limit beim Laden der Batterie aus dem Netz (optional)
      timeout: 10s # Zeitüberschreitung, optional
      capacity: 2 # Akkukapazität (kWh), optional
      maxchargepower: 1200 # Maximale Ladeleistung (W), Für erzwungenes Laden des Speichers. (optional)
      maxdischargepower: 800 # Maximale Entladeleistung (W), Maximale Entladeleistung des Speichers. (optional)
params:
  - name: account
    example: dev@zendure.com
    default:
    choice: []
    unit:
    description: Account ID
    help:
    advanced: false
    optional: false
  - name: serial
    example: VU5D99F74021B04
    default:
    choice: []
    unit:
    description: Seriennummer
    help: Zu finden in der Zendure App in den Einstellungen des Geräts
    advanced: false
    optional: false
  - name: region
    example:
    default: EU
    choice: ['EU', 'Global']
    unit:
    description: Region
    help:
    advanced: false
    optional: false
  - name: minsoc
    example: 25
    default:
    choice: []
    unit: '%'
    description: Minimaler Ladestand
    help: Untere Grenze beim Entladen der Batterie im normalen Betrieb
    advanced: false
    optional: true
  - name: maxsoc
    example: 95
    default:
    choice: []
    unit: '%'
    description: Maximaler Ladestand
    help: Oberes Limit beim Laden der Batterie aus dem Netz
    advanced: false
    optional: true
  - name: timeout
    example: 10s
    default:
    choice: []
    unit:
    description: Zeitüberschreitung
    help:
    advanced: false
    optional: true
  - name: capacity
    example: 50
    default: 2
    choice: []
    unit: kWh
    description: Akkukapazität
    help:
    advanced: true
    optional: true
  - name: maxchargepower
    example:
    default: 1200
    choice: []
    unit: W
    description: Maximale Ladeleistung
    help: Für erzwungenes Laden des Speichers.
    advanced: true
    optional: true
  - name: maxdischargepower
    example:
    default: 800
    choice: []
    unit: W
    description: Maximale Entladeleistung
    help: Maximale Entladeleistung des Speichers.
    advanced: true
    optional: true