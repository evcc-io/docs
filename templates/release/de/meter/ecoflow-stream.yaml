  - name: accesskey
    example:
    default:
    choice: []
    unit:
    description: Access Key
    help: Access Key aus der EcoFlow Developer Console
    advanced: false
    optional: false
  - name: secretkey
    example:
    default:
    choice: []
    unit:
    description: Secret Key
    help: Secret Key aus der EcoFlow Developer Console
    advanced: false
    optional: false
  - name: serial
    example:
    default:
    choice: []
    unit:
    description: Seriennummer
    help: Seriennummer des Hauptgeräts (normalerweise das erste Gerät) Ihres Stream Systems
    advanced: false
    optional: false
  - name: capacity
    example: 50
    default:
    choice: []
    unit: kWh
    description: Akkukapazität
    help:
