template: ecoflow-powerocean
product:
  identifier: ecoflow-powerocean
  brand: EcoFlow
  description: PowerOcean
description: |
  Für die Nutzung des EcoFlow PowerOcean Meters benötigen Sie:
  - Einen gültigen Access Key von der EcoFlow Developer Console
  - Den entsprechenden Secret Key
  - Die Seriennummer Ihres PowerOcean Systems

  Diese Credentials erhalten Sie über die EcoFlow Developer Console nach der Registrierung Ihrer Anwendung.

render:
  - usage: grid
    default: |
      type: template
      template: ecoflow-powerocean
      usage: grid
      accesskey: # Access Key, Access Key aus der EcoFlow Developer Console
      secretkey: # Secret Key, Secret Key aus der EcoFlow Developer Console
      serial: # Seriennummer
    advanced: |
      type: template
      template: ecoflow-powerocean
      usage: grid
      accesskey: # Access Key, Access Key aus der EcoFlow Developer Console
      secretkey: # Secret Key, Secret Key aus der EcoFlow Developer Console
      serial: # Seriennummer
      region: auto # API Region, Manche Nutzer, z.B. mit Starlink-Internet, sehen gelegentlich in den Logs den "error code 8513". Das passiert, wenn die API Region nicht korrekt erkannt wird. Um das zu beheben, kann man die API Region manuell setzen. Mögliche Werte: auto (Standard), europe oder america. [auto, europe, america] (optional)
      cache: 30s # Cache, Zeitintervall für erneute Datenabfrage (optional)
  - usage: pv
    default: |
      type: template
      template: ecoflow-powerocean
      usage: pv
      accesskey: # Access Key, Access Key aus der EcoFlow Developer Console
      secretkey: # Secret Key, Secret Key aus der EcoFlow Developer Console
      serial: # Seriennummer
    advanced: |
      type: template
      template: ecoflow-powerocean
      usage: pv
      accesskey: # Access Key, Access Key aus der EcoFlow Developer Console
      secretkey: # Secret Key, Secret Key aus der EcoFlow Developer Console
      serial: # Seriennummer
      region: auto # API Region, Manche Nutzer, z.B. mit Starlink-Internet, sehen gelegentlich in den Logs den "error code 8513". Das passiert, wenn die API Region nicht korrekt erkannt wird. Um das zu beheben, kann man die API Region manuell setzen. Mögliche Werte: auto (Standard), europe oder america. [auto, europe, america] (optional)
      cache: 30s # Cache, Zeitintervall für erneute Datenabfrage (optional)
  - usage: battery
    default: |
      type: template
      template: ecoflow-powerocean
      usage: battery
      accesskey: # Access Key, Access Key aus der EcoFlow Developer Console
      secretkey: # Secret Key, Secret Key aus der EcoFlow Developer Console
      serial: # Seriennummer
    advanced: |
      type: template
      template: ecoflow-powerocean
      usage: battery
      accesskey: # Access Key, Access Key aus der EcoFlow Developer Console
      secretkey: # Secret Key, Secret Key aus der EcoFlow Developer Console
      serial: # Seriennummer
      region: auto # API Region, Manche Nutzer, z.B. mit Starlink-Internet, sehen gelegentlich in den Logs den "error code 8513". Das passiert, wenn die API Region nicht korrekt erkannt wird. Um das zu beheben, kann man die API Region manuell setzen. Mögliche Werte: auto (Standard), europe oder america. [auto, europe, america] (optional)
      cache: 30s # Cache, Zeitintervall für erneute Datenabfrage (optional)
params:
  - name: accesskey
    example:
    default:
    choice: []
    unit:
    description: Access Key
    help: Access Key aus der EcoFlow Developer Console
    advanced: false
    optional: false
  - name: secretkey
    example:
    default:
    choice: []
    unit:
    description: Secret Key
    help: Secret Key aus der EcoFlow Developer Console
    advanced: false
    optional: false
  - name: serial
    example:
    default:
    choice: []
    unit:
    description: Seriennummer
    help:
    advanced: false
    optional: false
  - name: region
    example:
    default: auto
    choice: ['auto', 'europe', 'america']
    unit:
    description: API Region
    help: 'Manche Nutzer, z.B. mit Starlink-Internet, sehen gelegentlich in den Logs den "error code 8513". Das passiert, wenn die API Region nicht korrekt erkannt wird. Um das zu beheben, kann man die API Region manuell setzen. Mögliche Werte: auto (Standard), europe oder america.'
    advanced: true
    optional: true
  - name: cache
    example: 5m
    default: 30s
    choice: []
    unit:
    description: Cache
    help: Zeitintervall für erneute Datenabfrage
    advanced: true
    optional: true