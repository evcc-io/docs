template: slimmelezer-V2
product:
  identifier: zuidwijk-slimmelezer-plus-v2
  brand: Zuidwijk
  description: SlimmeLezer(+) V2
description: |
  Neuere Slimmelezer-Geräte verwenden eine andere Konfiguration. Probieren Sie diese Vorlage aus, wenn die andere fehlschlägt.
render:
  - usage: grid
    default: |
      type: template
      template: slimmelezer-V2
      usage: grid
      host: 192.0.2.2 # IP-Adresse oder Hostname
      scale: 1000 # Skalierungsfaktor, Verwenden Skala von 1000 für Zuidwijk Slimmelezer. Verwenden Skala 1 für ESPHome DSMR und mhendriks P1 Dongle
      firmware: <2026.1 # ESPHome Firmware-Version, ESPHome ab 2026.1 adressiert Sensoren über den Entitätsnamen. Die alten /sensor/<object_id> URLs sind veraltet und werden in ESPHome 2026.7.0 entfernt. Wähle '>=2026.1', wenn dein Gerät ESPHome 2026.1 oder neuer verwendet. [<2026.1, >=2026.1] (optional)
params:
  - name: host
    example: 192.0.2.2
    default:
    choice: []
    unit:
    description: IP-Adresse oder Hostname
    help:
    advanced: false
    optional: false
  - name: scale
    example: 1 | 10 | 100 | 1000
    default: 1000
    choice: []
    unit:
    description: Skalierungsfaktor
    help: Verwenden Skala von 1000 für Zuidwijk Slimmelezer. Verwenden Skala 1 für ESPHome DSMR und mhendriks P1 Dongle
    advanced: false
    optional: false
  - name: firmware
    example:
    default: <2026.1
    choice: ['<2026.1', '>=2026.1']
    unit:
    description: ESPHome Firmware-Version
    help: ESPHome ab 2026.1 adressiert Sensoren über den Entitätsnamen. Die alten /sensor/<object_id> URLs sind veraltet und werden in ESPHome 2026.7.0 entfernt. Wähle '>=2026.1', wenn dein Gerät ESPHome 2026.1 oder neuer verwendet.
    advanced: false
    optional: true