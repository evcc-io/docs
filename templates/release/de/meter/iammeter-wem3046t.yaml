template: iammeter-3p
product:
  identifier: iammeter-wem3046t
  brand: IAMMETER
  description: WEM3046T
description: |
  Die Aktivierung des Net Metering Mode (NEM) (=phasensaldierende Zählung) ist erforderlich.
  Siehe https://www.iammeter.com/newsshow/net-energy-metering

render:
  - usage: grid
    default: |
      type: template
      template: iammeter-3p
      usage: grid
      host: 192.0.2.2 # IP-Adresse oder Hostname
    advanced: |
      type: template
      template: iammeter-3p
      usage: grid
      host: 192.0.2.2 # IP-Adresse oder Hostname
      cache: 2s # Cache, Zeitintervall für erneute Datenabfrage (optional)
  - usage: pv
    default: |
      type: template
      template: iammeter-3p
      usage: pv
      host: 192.0.2.2 # IP-Adresse oder Hostname
    advanced: |
      type: template
      template: iammeter-3p
      usage: pv
      host: 192.0.2.2 # IP-Adresse oder Hostname
      cache: 2s # Cache, Zeitintervall für erneute Datenabfrage (optional)
  - usage: charge
    default: |
      type: template
      template: iammeter-3p
      usage: charge
      host: 192.0.2.2 # IP-Adresse oder Hostname
    advanced: |
      type: template
      template: iammeter-3p
      usage: charge
      host: 192.0.2.2 # IP-Adresse oder Hostname
      cache: 2s # Cache, Zeitintervall für erneute Datenabfrage (optional)
params:
  - name: host
    example: 192.0.2.2
    default:
    choice: []
    unit:
    description: IP-Adresse oder Hostname
    help:
    advanced: false
    optional: false
  - name: cache
    example: 5m
    default: 2s
    choice: []
    unit:
    description: Cache
    help: Zeitintervall für erneute Datenabfrage
    advanced: true
    optional: true