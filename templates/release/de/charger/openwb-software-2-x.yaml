template: openwb-2.0
product:
  identifier: openwb-software-2-x
  brand: openWB
  description: Software 2.x
capabilities: ["mA", "1p3p", "meter"]
description: |
  Erfordert [`Software 2.x`](https://github.com/openWB/core).
  Folgende Änderungen sind unter dem `Einstellungen`-Reiter erforderlich:

  * Steuerungsmodus: `secondary`
  * Steuerung über Modbus als secondary: `An`

  RFID-Autorisierung ist mit openWB Software 2.x leider aktuell nicht sinnvoll nutzbar, siehe
  [`openWB Issue 2832`](https://github.com/openWB/core/issues/2832)

render:
  - default: |
      type: template
      template: openwb-2.0

      # Modbus TCP
      modbus: tcpip
      id: 1
      host:  # Hostname
      port: 1502 # Port
    advanced: |
      type: template
      template: openwb-2.0

      # Modbus TCP
      modbus: tcpip
      id: 1
      host:  # Hostname
      port: 1502 # Port
      connector: 1 # Anschlussnummer, Bei Ladestationen mit mehreren Anschlüssen. Zählung beginnt bei 1. (optional)
      phases1p3p: true # Phasenumschaltung vorhanden, optional
      identify: # RFID-Reader verwenden, Unbedingt [`openWB Issue 2832`](https://github.com/openWB/core/issues/2832) beachten, sollte nicht für Zugangsschutz verwendet werden! (optional)
params:
  - name: modbus
    example:
    default:
    choice: ['tcpip']
    unit:
    description: Modbus Typ
    help:
    advanced: false
    optional: false
  - name: connector
    example:
    default: 1
    choice: []
    unit:
    description: Anschlussnummer
    help: Bei Ladestationen mit mehreren Anschlüssen. Zählung beginnt bei 1.
    advanced: true
    optional: true
  - name: phases1p3p
    example:
    default: true
    choice: []
    unit:
    description: Phasenumschaltung vorhanden
    help:
    advanced: true
    optional: true
  - name: identify
    example:
    default:
    choice: []
    unit:
    description: RFID-Reader verwenden
    help: Unbedingt [`openWB Issue 2832`](https://github.com/openWB/core/issues/2832) beachten, sollte nicht für Zugangsschutz verwendet werden!
    advanced: true
    optional: true
modbus:
  host:
  id: 1
  modbus: tcpip
  port: 1502
  tcpip: true