template: emsesp
product:
  identifier: bosch-sg-ready
  brand: Bosch
  description: SG Ready
  group: Wärmeerzeuger
description: |
  Eingebunden via [emsesp.org](https://emsesp.org/)
render:
  - default: |
      type: template
      template: emsesp
      host: 192.0.2.2 # IP-Adresse oder Hostname
      token: # Token, optional
      powersource: hpcurrpower # Leistungsquelle, [hpcurrpower, hppower] (optional)
      tempsource: # Temperaturquelle, [warmwater] (optional)
    advanced: |
      type: template
      template: emsesp
      host: 192.0.2.2 # IP-Adresse oder Hostname
      token: # Token, optional
      powersource: hpcurrpower # Leistungsquelle, [hpcurrpower, hppower] (optional)
      tempsource: # Temperaturquelle, [warmwater] (optional)
      sg1: hpin1opt # SG1-Eingang, [hpin1opt, hpin2opt, hpin3opt, hpin4opt] (optional)
      sg4: hpin4opt # SG4-Eingang, [hpin1opt, hpin2opt, hpin3opt, hpin4opt] (optional)
      value_normal_sg4: 0xxxxxxxxxxx # Bitmask für SG4 im Normalbetrieb, optional
      value_normal_sg1: 0xxxxxxxxxxxxxx # Bitmask für SG1 im Normalbetrieb, optional
      value_boost_sg4: 1xxxxxxxxxxx # Bitmask für SG4 im Boost-Betrieb, optional
      value_boost_sg1: # Bitmask für SG1 im Boost-Betrieb, optional
      value_dim_sg1: 1xxxxxxxxxxxxxx # Bitmask für SG1 im Dimm-Betrieb, optional
      value_dim_sg4: 0xxxxxxxxxxx # Bitmask für SG4 im Dimm-Betrieb, optional
params:
  - name: host
    example: 192.0.2.2
    default:
    choice: []
    unit:
    description: IP-Adresse oder Hostname
    help:
    advanced: false
    optional: false
  - name: token
    example:
    default:
    choice: []
    unit:
    description: Token
    help:
    advanced: false
    optional: true
  - name: powersource
    example:
    default: hpcurrpower
    choice: ['hpcurrpower', 'hppower']
    unit:
    description: Leistungsquelle
    help:
    advanced: false
    optional: true
  - name: tempsource
    example:
    default:
    choice: ['warmwater']
    unit:
    description: Temperaturquelle
    help:
    advanced: false
    optional: true
  - name: sg1
    example:
    default: hpin1opt
    choice: ['hpin1opt', 'hpin2opt', 'hpin3opt', 'hpin4opt']
    unit:
    description: SG1-Eingang
    help:
    advanced: true
    optional: true
  - name: sg4
    example:
    default: hpin4opt
    choice: ['hpin1opt', 'hpin2opt', 'hpin3opt', 'hpin4opt']
    unit:
    description: SG4-Eingang
    help:
    advanced: true
    optional: true
  - name: value_normal_sg4
    example:
    default: 0xxxxxxxxxxx
    choice: []
    unit:
    description: Bitmask für SG4 im Normalbetrieb
    help:
    advanced: true
    optional: true
  - name: value_normal_sg1
    example:
    default: 0xxxxxxxxxxxxxx
    choice: []
    unit:
    description: Bitmask für SG1 im Normalbetrieb
    help:
    advanced: true
    optional: true
  - name: value_boost_sg4
    example:
    default: 1xxxxxxxxxxx
    choice: []
    unit:
    description: Bitmask für SG4 im Boost-Betrieb
    help:
    advanced: true
    optional: true
  - name: value_boost_sg1
    example:
    default:
    choice: []
    unit:
    description: Bitmask für SG1 im Boost-Betrieb
    help:
    advanced: true
    optional: true
  - name: value_dim_sg1
    example:
    default: 1xxxxxxxxxxxxxx
    choice: []
    unit:
    description: Bitmask für SG1 im Dimm-Betrieb
    help:
    advanced: true
    optional: true
  - name: value_dim_sg4
    example:
    default: 0xxxxxxxxxxx
    choice: []
