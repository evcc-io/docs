template: askoheat
product:
  identifier: askoma-askoheatplus
  brand: Askoma
  description: ASKOHEAT+
  group: Wärmeerzeuger
description: |
  Der ASKOHEAT+ muss über Modbus TCP erreichbar sein (Port 502).
  Über das Webinterface sicherstellen, dass "Load Setpoint" im Input Setting aktiviert ist.

  **Wichtig:** Im Loadpoint `mincurrent` und `maxcurrent` passend zum Gerät setzen,
  sowie `phases: 1` für einphasigen Betrieb konfigurieren.
  Beispiel AHIR-BI-plus-1.75: `mincurrent: 1.1`, `maxcurrent: 7.6` (bei 230V, 1 Phase).

render:
  - default: |
      type: template
      template: askoheat
      host: 192.0.2.2 # IP-Adresse oder Hostname
      port: 502 # Port, optional
      id: 1 # ID, optional
      tempsensor: 0 # Temperatursensor, [0, 1, 2, 3, 4] (optional)
params:
  - name: host
    example: 192.0.2.2
    default:
    choice: []
    unit:
    description: IP-Adresse oder Hostname
    help:
    advanced: false
    optional: false
  - name: port
    example:
    default: 502
    choice: []
    unit:
    description: Port
    help:
    advanced: false
    optional: true
  - name: id
    example:
    default: 1
    choice: []
    unit:
    description: ID
    help:
    advanced: false
    optional: true
  - name: tempsensor
    example:
    default: 0
    choice: ['0', '1', '2', '3', '4']
    unit:
    description: Temperatursensor
    help:
    advanced: false
    optional: true