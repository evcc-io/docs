template: ovum-mira
product:
  identifier: ovum-mira
  brand: OVUM
  description: MIRA
  group: Wärmeerzeuger
capabilities: ["meter", "dim"]
description: |
  Der Modbus-TCP-Server muss am Display unter „Einstellungen / Netzwerk“ aktiviert und der Modbus Login-Code deaktiviert (Wert 1) werden, da evcc die Login-Sequenz nicht durchführt.
  Die PV-Statusquelle muss am Display auf „EMS“ und die PV-Datenquelle auf die Leistungsvorgabe gestellt werden.
  Benötigt MIRA-Regler ab Softwareversion V1.1.3.

render:
  - default: |
      type: template
      template: ovum-mira
      host: 192.0.2.2 # IP-Adresse oder Hostname
      tempsource: # Temperaturquelle, [warmwater, buffer] (optional)
    advanced: |
      type: template
      template: ovum-mira
      host: 192.0.2.2 # IP-Adresse oder Hostname
      tempsource: # Temperaturquelle, [warmwater, buffer] (optional)
      wpmid: 111 # Slave-ID Wärmepumpenmodul, Modbus Slave-ID des Wärmepumpenmoduls (WPM 1 = 111 … WPM 8 = 118) (optional)
params:
  - name: host
    example: 192.0.2.2
    default:
    choice: []
    unit:
    description: IP-Adresse oder Hostname
    help:
    advanced: false
    optional: false
  - name: tempsource
    example:
    default:
    choice: ['warmwater', 'buffer']
    unit:
    description: Temperaturquelle
    help:
    advanced: false
    optional: true
  - name: wpmid
    example:
    default: 111
    choice: []
    unit:
    description: Slave-ID Wärmepumpenmodul
    help: Modbus Slave-ID des Wärmepumpenmoduls (WPM 1 = 111 … WPM 8 = 118)
    advanced: true
    optional: true