template: enovates
product:
  identifier: newmotion-lolo
  brand: NewMotion
  description: Lolo
capabilities: ["mA", "meter"]
requirements: ["sponsorship"]
description: |
  EMS über Modbus TCP muss auf der Ladestation aktiviert sein (ModBusTCPEMSEnabled und modbus.tcp.enabled = true).
render:
  - default: |
      type: template
      template: enovates

      # Modbus TCP
      modbus: tcpip
      id: 1
      host:  # Hostname
      port: 502 # Port
params:
  - name: modbus
    example:
    default:
    choice: ['tcpip']
    unit:
    description: Modbus Typ
    help:
    advanced: false
    optional: false
modbus:
  host:
  id: 1
  modbus: tcpip
  port: 502
  tcpip: true