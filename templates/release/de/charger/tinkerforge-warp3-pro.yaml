template: tinkerforge-warp-ws
product:
  identifier: tinkerforge-warp3-pro
  brand: TinkerForge
  description: WARP3 Pro
capabilities: ["rfid", "1p3p", "meter", "mA", "dim"]
requirements: ["skiptest"]
description: |
  Falls notwendig wird die WARP3/WARP4-eigene automatische Phasenumschaltung von EVCC beim Verbinden mit der Wallbox deaktiviert (siehe [docs.warp-charger.com](https://docs.warp-charger.com/docs/mqtt_http/api_reference/evse#evse_phase_auto_switch_warp3)). Phasenumschaltung (1p/3p) ist beim WARP2 nur mit einem zusätzlichen WARP Energy Manager möglich und beim WARP1 gar nicht, da keine CP-Trennung unterstützt wird. RFID steht beim WARP1 nur zur Verfügung, wenn zusätzlich ein NFC Bricklet nachgerüstet wurde. Beim WARP4 kann EVCC das Fahrzeug anhand seiner MAC-Adresse identifizieren, wenn "Autocharge" oder "Ladestand auslesen" in den ISO 15118-Einstellungen der Wallbox aktiviert ist. Das Auslesen des Fahrzeug-Ladestands per ISO 15118 erfordert "Ladestand auslesen" und ist nur beim WARP4 Pro verfügbar, da der eingebaute Stromzähler benötigt wird. Die ISO 15118-Funktionen erfordern WARP4-Firmware 2.12.2 oder neuer.
render:
  - default: |
      type: template
      template: tinkerforge-warp-ws
      uri: # URI, HTTP(S) Adresse
      user: # Benutzerkonto, bspw. E-Mail Adresse, User Id, etc. (optional)
      password: # Passwort, Zugangspasswort des Dienstes (optional)
    advanced: |
      type: template
      template: tinkerforge-warp-ws
      uri: # URI, HTTP(S) Adresse
      user: # Benutzerkonto, bspw. E-Mail Adresse, User Id, etc. (optional)
      password: # Passwort, Zugangspasswort des Dienstes (optional)
      energyMeterIndex: 0 # Energy Meter Index, Index des in der Warp konfigurierten Meters dessen Werte genutzt werden sollen. (optional)
params:
  - name: uri
    example:
    default:
    choice: []
    unit:
    description: URI
    help: HTTP(S) Adresse
    advanced: false
    optional: false
  - name: user
    example:
    default:
    choice: []
    unit:
    description: Benutzerkonto
    help: bspw. E-Mail Adresse, User Id, etc.
    advanced: false
    optional: true
  - name: password
    example:
    default:
    choice: []
    unit:
    description: Passwort
    help: Zugangspasswort des Dienstes
    advanced: false
    optional: true
  - name: energyMeterIndex
    example:
    default: 0
    choice: []
    unit:
    description: Energy Meter Index
    help: Index des in der Warp konfigurierten Meters dessen Werte genutzt werden sollen.
    advanced: true
    optional: true