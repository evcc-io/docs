template: voltcast
product:
  identifier: voltcast
  brand: Voltcast
  group: Dynamischer Strompreis
countries: ["EU"]
requirements: ["skiptest"]
description: |
  Benötigt einen Voltcast API-Schlüssel — kostenloser DE-LU-Tarif, kostenpflichtige Tarife für alle Zonen auf [voltcast.com](https://voltcast.com/register). Die Prognosegenauigkeit wird täglich unter [voltcast.com/accuracy](https://voltcast.com/accuracy) veröffentlicht.
render:
  - default: |
      type: template
      template: voltcast
      apikey: # API Key, API-Schlüssel von https://voltcast.com/dashboard
      zone: DE-LU # Bidding zone, [AL, AT, BE, BG, CH, CZ, DE-LU, DK1, DK2, EE, ES, FI, FR, GR, HR, HU, IE-SEM, IT-CALA, IT-CNOR, IT-CSUD, IT-NORD, IT-SARD, IT-SICI, IT-SUD, LT, LV, ME, MK, NL, NO1, NO2, NO3, NO4, NO5, PL, PT, RO, RS, SE1, SE2, SE3, SE4, SI, SK, UA, XK] (optional)
    advanced: |
      type: template
      template: voltcast
      apikey: # API Key, API-Schlüssel von https://voltcast.com/dashboard
      zone: DE-LU # Bidding zone, [AL, AT, BE, BG, CH, CZ, DE-LU, DK1, DK2, EE, ES, FI, FR, GR, HR, HU, IE-SEM, IT-CALA, IT-CNOR, IT-CSUD, IT-NORD, IT-SARD, IT-SICI, IT-SUD, LT, LV, ME, MK, NL, NO1, NO2, NO3, NO4, NO5, PL, PT, RO, RS, SE1, SE2, SE3, SE4, SI, SK, UA, XK] (optional)
      charges: # Aufschlag, Zusätzlicher fester Aufschlag pro kWh (optional)
      chargesZones: # Aufschlagszonen, Zeitabhängige Aufschläge, die den Standardaufschlag überschreiben. (optional)
      tax: # Steuer, Zusätzlicher prozentualer Aufschlag (z.B. 0.2 für 20%) (optional)
      formula: math.Max((price + charges) * (1 + tax), 0.0) # Formel, Individuelle Formel zur Berechnung des Preises (optional)
      average: # Stündliche Durchschnittskosten verwenden, optional
