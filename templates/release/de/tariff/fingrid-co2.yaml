    example:
    default:
    choice: []
    unit:
    description: Aufschlagszonen
    help: Zeitabhängige Aufschläge, die den Standardaufschlag überschreiben.
    advanced: true
    optional: true
  - name: tax
    example:
    default:
    choice: []
    unit:
    description: Steuer
