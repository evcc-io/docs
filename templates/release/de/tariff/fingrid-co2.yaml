    help: Erstellen Sie Ihren API-Schlüssel, indem Sie ein Konto unter [https://data.fingrid.fi/instructions](https://data.fingrid.fi/instructions) registrieren, einen neuen API-Schlüssel erstellen und diesen hier eingeben.
