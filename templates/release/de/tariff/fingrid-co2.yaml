template: fingrid-co2
product:
  identifier: fingrid-co2
  brand: Fingrid
  description: CO₂
  group: CO₂ Vorhersage
countries: ["FI"]
requirements: ["skiptest"]
description: |
  CO₂-Daten für das finnische nationale Netz von [Fingrid OpenData](https://www.fingrid.fi/en/electricity-market-information/real-time-co2-emissions-estimate/). Erhalte deinen API-Schlüssel, indem du ein Konto unter [https://data.fingrid.fi/instructions](https://data.fingrid.fi/instructions) registrierst.
render:
  - default: |
      type: template
      template: fingrid-co2
      apiKey: # API Key, Erstellen Sie Ihren API-Schlüssel, indem Sie ein Konto unter [https://data.fingrid.fi/instructions](https://data.fingrid.fi/instructions) registrieren, einen neuen API-Schlüssel erstellen und diesen hier eingeben.
    advanced: |
      type: template
      template: fingrid-co2
      apiKey: # API Key, Erstellen Sie Ihren API-Schlüssel, indem Sie ein Konto unter [https://data.fingrid.fi/instructions](https://data.fingrid.fi/instructions) registrieren, einen neuen API-Schlüssel erstellen und diesen hier eingeben.
      charges: # Aufschlag, Zusätzlicher fester Aufschlag pro kWh (optional)
      chargesZones: # Aufschlagszonen, Zeitabhängige Aufschläge, die den Standardaufschlag überschreiben. (optional)
      tax: # Steuer, Zusätzlicher prozentualer Aufschlag (z.B. 0.2 für 20%) (optional)
      formula: math.Max((price + charges) * (1 + tax), 0.0) # Formel, Individuelle Formel zur Berechnung des Preises (optional)
