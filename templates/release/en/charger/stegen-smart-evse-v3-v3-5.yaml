template: smart-evse
product:
  identifier: stegen-smart-evse-v3-v3-5
  brand: Stegen
  description: Smart Evse v3 / v3.5
capabilities: ["mA", "rfid", "1p3p"]
description: |
  Uses the REST API of the Smart Evse firmware (FW >= 3.6.0).
  evcc puts the device into the configured mode and controls the charge current via `override_current`.

render:
  - default: |
      type: template
      template: smart-evse
      host: 192.0.2.2 # IP address or hostname
    advanced: |
      type: template
      template: smart-evse
      host: 192.0.2.2 # IP address or hostname
      cache: 1s # Cache, Time interval for data refresh (optional)
      chargeMode: normal # Charge mode, [normal, smart] (optional)
params:
  - name: host
    example: 192.0.2.2
    default:
    choice: []
    unit:
    description: IP address or hostname
    help:
    advanced: false
    optional: false
  - name: cache
    example: 5m
    default: 1s
    choice: []
    unit:
    description: Cache
    help: Time interval for data refresh
    advanced: true
    optional: true
  - name: chargeMode
    example:
    default: normal
    choice: ['normal', 'smart']
    unit:
    description: Charge mode
    help:
    advanced: true
    optional: true