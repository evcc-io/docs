template: askoheat
product:
  identifier: askoma-askoheatplus
  brand: Askoma
  description: ASKOHEAT+
  group: Heating devices
capabilities: ["meter", "dim"]
description: |
  The ASKOHEAT+ must be reachable via Modbus TCP (port 502).
  Ensure "Load Setpoint" is enabled in Input Settings via the web interface.

  **Important:** In the loadpoint configuration, set `mincurrent` and `maxcurrent` to match
  your device, and configure `phases: 1` for single-phase operation.
  Example AHIR-BI-plus-1.75: `mincurrent: 1.1`, `maxcurrent: 7.6` (at 230V, 1 phase).

render:
  - default: |
      type: template
      template: askoheat
      host: 192.0.2.2 # IP address or hostname
      port: 502 # Port, optional
      id: 1 # ID, optional
      tempsensor: 0 # Temperature sensor, [0, 1, 2, 3, 4] (optional)
params:
  - name: host
    example: 192.0.2.2
    default:
    choice: []
    unit:
    description: IP address or hostname
    help:
    advanced: false
    optional: false
  - name: port
    example:
    default: 502
    choice: []
    unit:
    description: Port
    help:
    advanced: false
    optional: true
  - name: id
    example:
    default: 1
    choice: []
    unit:
    description: ID
    help:
    advanced: false
    optional: true
  - name: tempsensor
    example:
    default: 0
    choice: ['0', '1', '2', '3', '4']
    unit:
    description: Temperature sensor
    help:
    advanced: false
    optional: true