template: emsesp
product:
  identifier: buderus-sg-ready
  brand: Buderus
  description: SG Ready
  group: Heating devices
description: |
  Integrated via [emsesp.org](https://emsesp.org/)
render:
  - default: |
      type: template
      template: emsesp
      host: 192.0.2.2 # IP address or hostname
      token: # Token, optional
      powersource: hpcurrpower # Power source, [hpcurrpower, hppower] (optional)
      tempsource: # Temperature source, [warmwater] (optional)
    advanced: |
      type: template
      template: emsesp
      host: 192.0.2.2 # IP address or hostname
      token: # Token, optional
      powersource: hpcurrpower # Power source, [hpcurrpower, hppower] (optional)
      tempsource: # Temperature source, [warmwater] (optional)
      sg1: hpin1opt # SG1 input, [hpin1opt, hpin2opt, hpin3opt, hpin4opt] (optional)
      sg4: hpin4opt # SG4 input, [hpin1opt, hpin2opt, hpin3opt, hpin4opt] (optional)
      value_normal_sg4: 0xxxxxxxxxxx # Bitmask for SG4 in normal mode, optional
      value_normal_sg1: 0xxxxxxxxxxxxxx # Bitmask for SG1 in normal mode, optional
      value_boost_sg4: 1xxxxxxxxxxx # Bitmask for SG4 in boost mode, optional
      value_boost_sg1: # Bitmask for SG1 in boost mode, optional
      value_dim_sg1: 1xxxxxxxxxxxxxx # Bitmask for SG1 in dim mode, optional
      value_dim_sg4: 0xxxxxxxxxxx # Bitmask for SG4 in dim mode, optional
params:
  - name: host
    example: 192.0.2.2
    default:
    choice: []
    unit:
    description: IP address or hostname
    help:
    advanced: false
    optional: false
  - name: token
    example:
    default:
    choice: []
    unit:
    description: Token
    help:
    advanced: false
    optional: true
  - name: powersource
    example:
    default: hpcurrpower
    choice: ['hpcurrpower', 'hppower']
    unit:
    description: Power source
    help:
    advanced: false
    optional: true
  - name: tempsource
    example:
    default:
    choice: ['warmwater']
    unit:
    description: Temperature source
    help:
    advanced: false
    optional: true
  - name: sg1
    example:
    default: hpin1opt
    choice: ['hpin1opt', 'hpin2opt', 'hpin3opt', 'hpin4opt']
    unit:
    description: SG1 input
    help:
    advanced: true
    optional: true
  - name: sg4
    example:
    default: hpin4opt
    choice: ['hpin1opt', 'hpin2opt', 'hpin3opt', 'hpin4opt']
    unit:
    description: SG4 input
    help:
    advanced: true
    optional: true
  - name: value_normal_sg4
    example:
    default: 0xxxxxxxxxxx
    choice: []
    unit:
    description: Bitmask for SG4 in normal mode
    help:
    advanced: true
    optional: true
  - name: value_normal_sg1
    example:
    default: 0xxxxxxxxxxxxxx
    choice: []
    unit:
    description: Bitmask for SG1 in normal mode
