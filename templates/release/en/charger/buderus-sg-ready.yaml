  - name: value_boost_sg4
    example:
    default: 1xxxxxxxxxxx
    choice: []
    unit:
    description: Bitmask for SG4 in boost mode
    help:
    advanced: true
    optional: true
  - name: value_boost_sg1
    example:
    default:
    choice: []
    unit:
    description: Bitmask for SG1 in boost mode
    help:
    advanced: true
    optional: true
  - name: value_dim_sg1
    example:
    default: 1xxxxxxxxxxxxxx
    choice: []
    unit:
    description: Bitmask for SG1 in dim mode
