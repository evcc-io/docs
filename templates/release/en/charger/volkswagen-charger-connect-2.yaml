template: elli-2
product:
  identifier: volkswagen-charger-connect-2
  brand: Volkswagen
  description: Charger Connect 2
capabilities: ["iso151182", "1p3p", "rfid", "mA"]
description: |
  The wallbox PV surplus charging must be disabled (Charging management -> Charging settings -> PV surplus charging off).

  Phase switching and RFID identification require the IP address and technician password. Phase switching should be enabled in the wallbox settings (Charging management -> Charging settings).

render:
  - default: |
      type: template
      template: elli-2
      ski: # Subject Key Identifier (SKI), Usually found on the web interface of the wallbox
      ip: 192.0.2.2 # IP address, IP address of the wallbox. Required for phase switching and RFID identification. (optional)
      password: # Password, Technician password. Required for phase switching and RFID identification. (optional)
params:
  - name: ski
    example:
    default:
    choice: []
    unit:
    description: Subject Key Identifier (SKI)
    help: Usually found on the web interface of the wallbox
    advanced: false
    optional: false
  - name: ip
    example: 192.0.2.2
    default:
    choice: []
    unit:
    description: IP address
    help: IP address of the wallbox. Required for phase switching and RFID identification.
    advanced: false
    optional: true
  - name: password
    example:
    default:
    choice: []
    unit:
    description: Password
    help: Technician password. Required for phase switching and RFID identification.
    advanced: false
    optional: true