template: ovum-mira
product:
  identifier: ovum-mira
  brand: OVUM
  description: MIRA
  group: Heating devices
capabilities: ["meter", "dim"]
description: |
  The Modbus TCP server must be enabled at the display under "Settings / Network" and the Modbus login code must be disabled (value 1) since evcc does not perform the login sequence.
  The PV status source must be set to "EMS" and the PV data source to the power setpoint at the display.
  Requires MIRA controller software V1.1.3 or later.

render:
  - default: |
      type: template
      template: ovum-mira
      host: 192.0.2.2 # IP address or hostname
      tempsource: # Temperature source, [warmwater, buffer] (optional)
    advanced: |
      type: template
      template: ovum-mira
      host: 192.0.2.2 # IP address or hostname
      tempsource: # Temperature source, [warmwater, buffer] (optional)
      wpmid: 111 # Heat pump module slave id, Modbus slave id of the heat pump module (WPM 1 = 111 … WPM 8 = 118) (optional)
params:
  - name: host
    example: 192.0.2.2
    default:
    choice: []
    unit:
    description: IP address or hostname
    help:
    advanced: false
    optional: false
  - name: tempsource
    example:
    default:
    choice: ['warmwater', 'buffer']
    unit:
    description: Temperature source
    help:
    advanced: false
    optional: true
  - name: wpmid
    example:
    default: 111
    choice: []
    unit:
    description: Heat pump module slave id
    help: Modbus slave id of the heat pump module (WPM 1 = 111 … WPM 8 = 118)
    advanced: true
    optional: true