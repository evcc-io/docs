template: eebus-ohpcf-wolfvaillant
product:
  identifier: vaillant-eebus
  brand: Vaillant
  description: EEBus
  group: Heating devices
capabilities: ["meter", "dim"]
render:
  - default: |
      type: template
      template: eebus-ohpcf-wolfvaillant
      ski: # Subject Key Identifier (SKI), Usually found on the web interface of the wallbox
      ip: 192.0.2.2 # IP address, optional
    advanced: |
      type: template
      template: eebus-ohpcf-wolfvaillant
      ski: # Subject Key Identifier (SKI), Usually found on the web interface of the wallbox
      ip: 192.0.2.2 # IP address, optional
      reboost: 10m # Reboost interval, Wait time after which a newly announced optional power consumption is scheduled again. (optional)
params:
  - name: ski
    example:
    default:
    choice: []
    unit:
    description: Subject Key Identifier (SKI)
    help: Usually found on the web interface of the wallbox
    advanced: false
    optional: false
  - name: ip
    example: 192.0.2.2
    default:
    choice: []
    unit:
    description: IP address
    help:
    advanced: false
    optional: true
  - name: reboost
    example:
    default: 10m
    choice: []
    unit:
    description: Reboost interval
    help: Wait time after which a newly announced optional power consumption is scheduled again.
    advanced: true
    optional: true