template: tinkerforge-warp-ws
product:
  identifier: tinkerforge-warp2-smart
  brand: TinkerForge
  description: WARP2 Smart
capabilities: ["rfid", "mA", "dim"]
requirements: ["skiptest"]
description: |
  If necessary, WARP3's/WARP4's own automatic phase switching will be deactivated by EVCC when connecting to the wallbox (see [docs.warp-charger.com](https://docs.warp-charger.com/docs/mqtt_http/api_reference/evse#evse_phase_auto_switch_warp3)). Phase switching (1p/3p) is only possible on the WARP2 with an additional WARP Energy Manager, and not possible at all on the WARP1, since it does not support CP separation. RFID on the WARP1 is only available if an NFC Bricklet has been retrofitted. On the WARP4, EVCC can identify the vehicle by its MAC address if "Autocharge" or "Read state of charge" is enabled in the wallbox's ISO 15118 settings. Reading the vehicle SoC via ISO 15118 requires "Read state of charge" and is only available on the WARP4 Pro, since it needs the built-in energy meter. The ISO 15118 features require WARP4 firmware 2.12.2 or later.
render:
  - default: |
      type: template
      template: tinkerforge-warp-ws
      uri: # URI, HTTP(S) address
      user: # Username, e.g. email address, user id, etc. (optional)
      password: # Password, Service account password (optional)
    advanced: |
      type: template
      template: tinkerforge-warp-ws
      uri: # URI, HTTP(S) address
      user: # Username, e.g. email address, user id, etc. (optional)
      password: # Password, Service account password (optional)
      energyMeterIndex: 0 # Energy Meter Index, Index of the meter configured in the WARP charger whose values should be used. (optional)
params:
  - name: uri
    example:
    default:
    choice: []
    unit:
    description: URI
    help: HTTP(S) address
    advanced: false
    optional: false
  - name: user
    example:
    default:
    choice: []
    unit:
    description: Username
    help: e.g. email address, user id, etc.
    advanced: false
    optional: true
  - name: password
    example:
    default:
    choice: []
    unit:
    description: Password
    help: Service account password
    advanced: false
    optional: true
  - name: energyMeterIndex
    example:
    default: 0
    choice: []
    unit:
    description: Energy Meter Index
    help: Index of the meter configured in the WARP charger whose values should be used.
    advanced: true
    optional: true