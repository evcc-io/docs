template: demo-temperature-forecast
product:
  identifier: demo-temperature-forecast
  description: Demo Temperature Forecast
  group: Temperature forecast
requirements: ["skiptest"]
description: |
  For demonstration purposes. Provides outdoor temperature data based on a typical daily cycle.
render:
  - default: |
      type: template
      template: demo-temperature-forecast
      min: 10 # Minimum temperature (°C), optional
      max: 20 # Maximum temperature (°C), optional
params:
  - name: min
    example:
    default: 10
    choice: []
    unit: °C
    description: Minimum temperature
    help:
    advanced: false
    optional: true
  - name: max
    example:
    default: 20
    choice: []
    unit: °C
    description: Maximum temperature
    help:
    advanced: false
    optional: true