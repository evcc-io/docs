template: fixed-zones
product:
  identifier: time-based-tariff
  description: Time-based Tariff
  group: Dynamic electricity price
description: |
  Time-dependent electricity prices with different price zones for night rates, weekend rates or seasonal tariffs. If zones overlap, the last matching zone applies.
render:
  - default: |
      type: template
      template: fixed-zones
      price: # Default price, When no zone applies.
      zones: # Price zones
    advanced: |
      type: template
      template: fixed-zones
      price: # Default price, When no zone applies.
      zones: # Price zones
      charges: # Charge, Additional fixed charge per kWh (optional)
      chargesZones: # Charges zones, Time-based grid fees that override the default charge. (optional)
      tax: # Tax, Additional percentage charge (e.g. 0.2 for 20%) (optional)
      formula: math.Max((price + charges) * (1 + tax), 0.0) # Formula, Individual formula for calculating the price (optional)
