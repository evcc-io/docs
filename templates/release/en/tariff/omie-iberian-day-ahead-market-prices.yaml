template: omie
product:
  identifier: omie-iberian-day-ahead-market-prices
  brand: OMIE
  description: Iberian day-ahead market prices
  group: Dynamic electricity price
countries: ["PT", "ES"]
requirements: ["skiptest"]
description: |
  Day-ahead electricity prices from OMIE for Portugal and Spain. No API key is required.
render:
  - default: |
      type: template
      template: omie
      country: PT # Country, Select whether to use the Portuguese or Spanish market price published by OMIE. [PT, ES]
    advanced: |
      type: template
      template: omie
      country: PT # Country, Select whether to use the Portuguese or Spanish market price published by OMIE. [PT, ES]
      charges: # Charge, Additional fixed charge per kWh (optional)
      chargesZones: # Charges zones, Time-based grid fees that override the default charge. (optional)
      tax: # Tax, Additional percentage charge (e.g. 0.2 for 20%) (optional)
      formula: math.Max((price + charges) * (1 + tax), 0.0) # Formula, Individual formula for calculating the price (optional)
      average: # Average by hour, optional
params:
  - name: country
    example:
    default: PT
    choice: ['PT', 'ES']
    unit:
    description: Country
    help: Select whether to use the Portuguese or Spanish market price published by OMIE.
    advanced: false
    optional: false
  - name: charges
    example:
    default:
    choice: []
    unit:
    description: Charge
    help: Additional fixed charge per kWh
    advanced: true
    optional: true
  - name: chargesZones
    example:
    default:
    choice: []
    unit:
    description: Charges zones
    help: Time-based grid fees that override the default charge.
    advanced: true
    optional: true
  - name: tax
    example:
    default:
    choice: []
    unit:
    description: Tax
    help: Additional percentage charge (e.g. 0.2 for 20%)
    advanced: true
    optional: true
  - name: formula
    example: math.Max((price + charges) * (1 + tax), 0.0)
    default:
    choice: []
    unit:
    description: Formula
    help: Individual formula for calculating the price
    advanced: true
    optional: true
  - name: average
    example:
    default:
    choice: []
    unit:
    description: Average by hour
    help:
    advanced: true
    optional: true