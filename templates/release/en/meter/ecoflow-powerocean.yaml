template: ecoflow-powerocean
product:
  identifier: ecoflow-powerocean
  brand: EcoFlow
  description: PowerOcean
description: |
  To use the EcoFlow PowerOcean meter you need:
  - A valid Access Key from the EcoFlow Developer Console
  - The corresponding Secret Key
  - The serial number of your PowerOcean system

  These credentials can be obtained through the EcoFlow Developer Console after registering your application.

render:
  - usage: grid
    default: |
      type: template
      template: ecoflow-powerocean
      usage: grid
      accesskey: # Access Key, Access Key from EcoFlow Developer Console
      secretkey: # Secret Key, Secret Key from EcoFlow Developer Console
      serial: # Serial
    advanced: |
      type: template
      template: ecoflow-powerocean
      usage: grid
      accesskey: # Access Key, Access Key from EcoFlow Developer Console
      secretkey: # Secret Key, Secret Key from EcoFlow Developer Console
      serial: # Serial
      region: auto # API Region, If you sometimes see error code 8513, like for example Starlink users do, automatic region detection fails. Here, you can set the API region manually. Possible values: auto (default), europe, or america. [auto, europe, america] (optional)
      cache: 30s # Cache, Time interval for data refresh (optional)
  - usage: pv
    default: |
      type: template
      template: ecoflow-powerocean
      usage: pv
      accesskey: # Access Key, Access Key from EcoFlow Developer Console
      secretkey: # Secret Key, Secret Key from EcoFlow Developer Console
      serial: # Serial
    advanced: |
      type: template
      template: ecoflow-powerocean
      usage: pv
      accesskey: # Access Key, Access Key from EcoFlow Developer Console
      secretkey: # Secret Key, Secret Key from EcoFlow Developer Console
      serial: # Serial
      region: auto # API Region, If you sometimes see error code 8513, like for example Starlink users do, automatic region detection fails. Here, you can set the API region manually. Possible values: auto (default), europe, or america. [auto, europe, america] (optional)
      cache: 30s # Cache, Time interval for data refresh (optional)
  - usage: battery
    default: |
      type: template
      template: ecoflow-powerocean
      usage: battery
      accesskey: # Access Key, Access Key from EcoFlow Developer Console
      secretkey: # Secret Key, Secret Key from EcoFlow Developer Console
      serial: # Serial
    advanced: |
      type: template
      template: ecoflow-powerocean
      usage: battery
      accesskey: # Access Key, Access Key from EcoFlow Developer Console
      secretkey: # Secret Key, Secret Key from EcoFlow Developer Console
      serial: # Serial
      region: auto # API Region, If you sometimes see error code 8513, like for example Starlink users do, automatic region detection fails. Here, you can set the API region manually. Possible values: auto (default), europe, or america. [auto, europe, america] (optional)
      cache: 30s # Cache, Time interval for data refresh (optional)
params:
  - name: accesskey
    example:
    default:
    choice: []
    unit:
    description: Access Key
    help: Access Key from EcoFlow Developer Console
    advanced: false
    optional: false
  - name: secretkey
    example:
    default:
    choice: []
    unit:
    description: Secret Key
    help: Secret Key from EcoFlow Developer Console
    advanced: false
    optional: false
  - name: serial
    example:
    default:
    choice: []
    unit:
    description: Serial
    help:
    advanced: false
    optional: false
  - name: region
    example:
    default: auto
    choice: ['auto', 'europe', 'america']
    unit:
    description: API Region
    help: 'If you sometimes see error code 8513, like for example Starlink users do, automatic region detection fails. Here, you can set the API region manually. Possible values: auto (default), europe, or america.'
    advanced: true
    optional: true
  - name: cache
    example: 5m
    default: 30s
    choice: []
    unit:
    description: Cache
    help: Time interval for data refresh
    advanced: true
    optional: true