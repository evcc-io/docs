template: demo-battery
product:
  identifier: demo-battery
  description: Demo battery
  group: Generic support
description: |
  For demonstration purposes. Battery with a fixed set of values.
render:
  - usage: battery
    default: |
      type: template
      template: demo-battery
      usage: battery
      power: # Power (W), optional
      soc: # Charge (%), optional
    advanced: |
      type: template
