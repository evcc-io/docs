template: iotawatt
product:
  identifier: iotawatt-energy-monitor
  brand: IoTaWatt
  description: Energy Monitor
description: |
  Requires an IoTaWatt device accessible on the local network.
  Find available series names on the IoTaWatt status page (`http://<device-ip>`).
  For single-phase setups, configure only the main series (e.g. `GridNet`, `Solar`).
  For three-phase, configure one series per phase (e.g. `Grid_A`, `Grid_B`, `Grid_C`).

render:
  - usage: grid
    default: |
      type: template
      template: iotawatt
      usage: grid
      host: 192.0.2.2 # IP address or hostname
      series: GridNet # L1 / single-phase series, IoTaWatt series name (Watts). Check the IoTaWatt status page for available series.
    advanced: |
      type: template
      template: iotawatt
      usage: grid
      host: 192.0.2.2 # IP address or hostname
      series: GridNet # L1 / single-phase series, IoTaWatt series name (Watts). Check the IoTaWatt status page for available series.
      seriesL2: # L2 series (three-phase), Series name for phase L2. Leave empty for single-phase. (optional)
      seriesL3: # L3 series (three-phase), Series name for phase L3. Leave empty for single-phase. (optional)
      cache: 2s # Cache, Time interval for data refresh (optional)
  - usage: pv
    default: |
      type: template
      template: iotawatt
      usage: pv
      host: 192.0.2.2 # IP address or hostname
      series: GridNet # L1 / single-phase series, IoTaWatt series name (Watts). Check the IoTaWatt status page for available series.
    advanced: |
      type: template
      template: iotawatt
      usage: pv
      host: 192.0.2.2 # IP address or hostname
      series: GridNet # L1 / single-phase series, IoTaWatt series name (Watts). Check the IoTaWatt status page for available series.
      seriesL2: # L2 series (three-phase), Series name for phase L2. Leave empty for single-phase. (optional)
      seriesL3: # L3 series (three-phase), Series name for phase L3. Leave empty for single-phase. (optional)
      cache: 2s # Cache, Time interval for data refresh (optional)
  - usage: charge
    default: |
      type: template
      template: iotawatt
      usage: charge
      host: 192.0.2.2 # IP address or hostname
      series: GridNet # L1 / single-phase series, IoTaWatt series name (Watts). Check the IoTaWatt status page for available series.
    advanced: |
      type: template
      template: iotawatt
      usage: charge
      host: 192.0.2.2 # IP address or hostname
      series: GridNet # L1 / single-phase series, IoTaWatt series name (Watts). Check the IoTaWatt status page for available series.
      seriesL2: # L2 series (three-phase), Series name for phase L2. Leave empty for single-phase. (optional)
      seriesL3: # L3 series (three-phase), Series name for phase L3. Leave empty for single-phase. (optional)
      cache: 2s # Cache, Time interval for data refresh (optional)
params:
  - name: host
    example: 192.0.2.2
    default:
    choice: []
    unit:
    description: IP address or hostname
    help:
    advanced: false
    optional: false
  - name: series
    example: GridNet
    default:
    choice: []
    unit:
    description: L1 / single-phase series
    help: IoTaWatt series name (Watts). Check the IoTaWatt status page for available series.
    advanced: false
    optional: false
  - name: seriesL2
    example:
    default:
    choice: []
    unit:
    description: L2 series (three-phase)
    help: Series name for phase L2. Leave empty for single-phase.
    advanced: true
    optional: true
  - name: seriesL3
    example:
    default:
    choice: []
    unit:
    description: L3 series (three-phase)
    help: Series name for phase L3. Leave empty for single-phase.
    advanced: true
    optional: true
  - name: cache
    example: 5m
    default: 2s
    choice: []
    unit:
    description: Cache
    help: Time interval for data refresh
    advanced: true
    optional: true