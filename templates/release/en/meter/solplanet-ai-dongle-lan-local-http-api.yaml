template: solplanet-ai-dongle
product:
  identifier: solplanet-ai-dongle-lan-local-http-api
  brand: Solplanet
  description: AI-Dongle LAN (local HTTP API)
description: |
  Uses the AI-Dongle local HTTP API (e.g. BA121T-30) instead of Modbus TCP.
  The inverter serial number (isn) can be read via `http://<host>:8484/getdev.cgi?device=2`.

render:
  - usage: grid
    default: |
      type: template
      template: solplanet-ai-dongle
      usage: grid
      host: 192.0.2.2 # IP address or hostname
      serial: # Inverter serial number (isn)
    advanced: |
      type: template
      template: solplanet-ai-dongle
      usage: grid
      host: 192.0.2.2 # IP address or hostname
      serial: # Inverter serial number (isn)
  - usage: pv
    default: |
      type: template
      template: solplanet-ai-dongle
      usage: pv
      host: 192.0.2.2 # IP address or hostname
      serial: # Inverter serial number (isn)
    advanced: |
      type: template
      template: solplanet-ai-dongle
      usage: pv
      host: 192.0.2.2 # IP address or hostname
      serial: # Inverter serial number (isn)
  - usage: battery
    default: |
      type: template
      template: solplanet-ai-dongle
      usage: battery
      host: 192.0.2.2 # IP address or hostname
      serial: # Inverter serial number (isn)
      capacity: 50 # Battery capacity (kWh), optional
      minsoc: 25 # Minimum charge (%), Lower limit when discharging the battery in normal operation (optional)
      maxsoc: 95 # Maximum charge (%), Upper limit when charging the battery from the grid (optional)
    advanced: |
      type: template
      template: solplanet-ai-dongle
      usage: battery
      host: 192.0.2.2 # IP address or hostname
      serial: # Inverter serial number (isn)
      capacity: 50 # Battery capacity (kWh), optional
      minsoc: 25 # Minimum charge (%), Lower limit when discharging the battery in normal operation (optional)
      maxsoc: 95 # Maximum charge (%), Upper limit when charging the battery from the grid (optional)
      maxchargepower: # Maximum charge power (W), For forced charging of the battery. (optional)
      maxdischargepower: # Maximum discharge power (W), Maximum discharge power of the storage. (optional)
params:
  - name: host
    example: 192.0.2.2
    default:
    choice: []
    unit:
    description: IP address or hostname
    help:
    advanced: false
    optional: false
  - name: serial
    example:
    default:
    choice: []
    unit:
    description: Inverter serial number (isn)
    help:
    advanced: false
    optional: false
  - name: capacity
    example: 50
    default:
    choice: []
    unit: kWh
    description: Battery capacity
    help:
    advanced: false
    optional: true
  - name: minsoc
    example: 25
    default:
    choice: []
    unit: '%'
    description: Minimum charge
    help: Lower limit when discharging the battery in normal operation
    advanced: false
    optional: true
  - name: maxsoc
    example: 95
    default:
    choice: []
    unit: '%'
    description: Maximum charge
    help: Upper limit when charging the battery from the grid
    advanced: false
    optional: true
  - name: maxchargepower
    example:
    default:
    choice: []
    unit: W
    description: Maximum charge power
    help: For forced charging of the battery.
    advanced: true
    optional: true
  - name: maxdischargepower
    example:
    default:
    choice: []
    unit: W
    description: Maximum discharge power
    help: Maximum discharge power of the storage.
    advanced: true
    optional: true