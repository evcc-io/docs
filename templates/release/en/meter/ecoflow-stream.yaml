template: ecoflow-stream
product:
  identifier: ecoflow-stream
  brand: EcoFlow
  description: Stream
description: |
  To use the EcoFlow Stream meter you need:
  - A valid Access Key from the EcoFlow Developer Console
  - The corresponding Secret Key
  - The main device serial number of your Stream system

  These credentials can be obtained through the EcoFlow Developer Console after registering your application.

render:
  - usage: grid
    default: |
      type: template
      template: ecoflow-stream
      usage: grid
      accesskey: # Access Key, Access Key from EcoFlow Developer Console
      secretkey: # Secret Key, Secret Key from EcoFlow Developer Console
      serial: # Serial, Serial number of the main device in your Stream system, normally the first device of your system
    advanced: |
      type: template
      template: ecoflow-stream
      usage: grid
      accesskey: # Access Key, Access Key from EcoFlow Developer Console
      secretkey: # Secret Key, Secret Key from EcoFlow Developer Console
      serial: # Serial, Serial number of the main device in your Stream system, normally the first device of your system
      region: auto # API Region, If you sometimes see error code 8513, like for example Starlink users do, automatic region detection fails. Here, you can set the API region manually. Possible values: auto (default), europe, or america. [auto, europe, america] (optional)
      cache: 30s # Cache, Time interval for data refresh (optional)
  - usage: pv
    default: |
      type: template
      template: ecoflow-stream
      usage: pv
      accesskey: # Access Key, Access Key from EcoFlow Developer Console
      secretkey: # Secret Key, Secret Key from EcoFlow Developer Console
      serial: # Serial, Serial number of the main device in your Stream system, normally the first device of your system
    advanced: |
      type: template
      template: ecoflow-stream
      usage: pv
      accesskey: # Access Key, Access Key from EcoFlow Developer Console
      secretkey: # Secret Key, Secret Key from EcoFlow Developer Console
      serial: # Serial, Serial number of the main device in your Stream system, normally the first device of your system
      region: auto # API Region, If you sometimes see error code 8513, like for example Starlink users do, automatic region detection fails. Here, you can set the API region manually. Possible values: auto (default), europe, or america. [auto, europe, america] (optional)
      cache: 30s # Cache, Time interval for data refresh (optional)
  - usage: battery
    default: |
      type: template
      template: ecoflow-stream
      usage: battery
      accesskey: # Access Key, Access Key from EcoFlow Developer Console
      secretkey: # Secret Key, Secret Key from EcoFlow Developer Console
      serial: # Serial, Serial number of the main device in your Stream system, normally the first device of your system
      capacity: 50 # Battery capacity (kWh), optional
      minsoc: 25 # Minimum charge (%), Lower limit when discharging the battery in normal operation (optional)
      maxsoc: 95 # Maximum charge (%), Upper limit when charging the battery from the grid (optional)
    advanced: |
      type: template
      template: ecoflow-stream
      usage: battery
      accesskey: # Access Key, Access Key from EcoFlow Developer Console
      secretkey: # Secret Key, Secret Key from EcoFlow Developer Console
      serial: # Serial, Serial number of the main device in your Stream system, normally the first device of your system
      capacity: 50 # Battery capacity (kWh), optional
      minsoc: 25 # Minimum charge (%), Lower limit when discharging the battery in normal operation (optional)
      maxsoc: 95 # Maximum charge (%), Upper limit when charging the battery from the grid (optional)
      region: auto # API Region, If you sometimes see error code 8513, like for example Starlink users do, automatic region detection fails. Here, you can set the API region manually. Possible values: auto (default), europe, or america. [auto, europe, america] (optional)
      cache: 30s # Cache, Time interval for data refresh (optional)
      maxchargepower: # Maximum charge power (W), For forced charging of the battery. (optional)
      maxdischargepower: # Maximum discharge power (W), Maximum discharge power of the storage. (optional)
params:
  - name: accesskey
    example:
    default:
    choice: []
    unit:
    description: Access Key
    help: Access Key from EcoFlow Developer Console
    advanced: false
    optional: false
  - name: secretkey
    example:
    default:
    choice: []
    unit:
    description: Secret Key
    help: Secret Key from EcoFlow Developer Console
    advanced: false
    optional: false
  - name: serial
    example:
    default:
    choice: []
    unit:
    description: Serial
    help: Serial number of the main device in your Stream system, normally the first device of your system
    advanced: false
    optional: false
  - name: capacity
    example: 50
    default:
    choice: []
    unit: kWh
    description: Battery capacity
    help:
    advanced: false
    optional: true
  - name: minsoc
    example: 25
    default:
    choice: []
    unit: '%'
    description: Minimum charge
    help: Lower limit when discharging the battery in normal operation
    advanced: false
    optional: true
  - name: maxsoc
    example: 95
    default:
    choice: []
    unit: '%'
    description: Maximum charge
    help: Upper limit when charging the battery from the grid
    advanced: false
    optional: true
  - name: region
    example:
    default: auto
    choice: ['auto', 'europe', 'america']
    unit:
    description: API Region
    help: 'If you sometimes see error code 8513, like for example Starlink users do, automatic region detection fails. Here, you can set the API region manually. Possible values: auto (default), europe, or america.'
    advanced: true
    optional: true
  - name: cache
    example: 5m
    default: 30s
    choice: []
    unit:
    description: Cache
    help: Time interval for data refresh
    advanced: true
    optional: true
  - name: maxchargepower
    example:
    default:
    choice: []
    unit: W
    description: Maximum charge power
    help: For forced charging of the battery.
    advanced: true
    optional: true
  - name: maxdischargepower
    example:
    default:
    choice: []
    unit: W
    description: Maximum discharge power
    help: Maximum discharge power of the storage.
    advanced: true
    optional: true