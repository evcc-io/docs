template: hoymiles-dtu-mb
product:
  identifier: hoymiles-hmt-hms-series-with-dtu-pro-s-modbus-tcp
  brand: Hoymiles
  description: HMT/HMS-Series with DTU PRO S / MODBUS TCP
description: |
  Requires a Hoymiles Inverter of the HMT/HMS Series with DTU PRO S datalogger with Modbus TCP enabled (connected with LAN)

render:
  - usage: pv
    default: |
      type: template
      template: hoymiles-dtu-mb
      usage: pv

      # Modbus TCP
      modbus: tcpip
      id: 1
      host:  # Hostname
      port: 502 # Port
    advanced: |
      type: template
      template: hoymiles-dtu-mb
      usage: pv

      # Modbus TCP
      modbus: tcpip
      id: 1
      host:  # Hostname
      port: 502 # Port
      maxacpower: 0 # Total maximum power of the inverters (W), Total maximum power of the inverters in watt (e.g. 3000) (optional)
params:
  - name: modbus
    example:
    default:
    choice: ['tcpip']
    unit:
    description: Modbus Type
    help:
    advanced: false
    optional: false
  - name: maxacpower
    example: 5000
    default: 0
    choice: []
    unit: W
    description: Total maximum power of the inverters
    help: Total maximum power of the inverters in watt (e.g. 3000)
    advanced: true
    optional: true
modbus:
  host:
  id: 1
  modbus: tcpip
  port: 502
  tcpip: true