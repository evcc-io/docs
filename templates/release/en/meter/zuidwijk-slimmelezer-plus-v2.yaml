template: slimmelezer-V2
product:
  identifier: zuidwijk-slimmelezer-plus-v2
  brand: Zuidwijk
  description: SlimmeLezer(+) V2
description: |
  More recent slimmelezer devices use a different configuration. Try this template if the other one fails.
render:
  - usage: grid
    default: |
      type: template
      template: slimmelezer-V2
      usage: grid
      host: 192.0.2.2 # IP address or hostname
      scale: 1000 # Scale factor, Use scale of 1000 for Zuidwijk Slimmelezer. Use scale 1 for ESPHome DSMR and mhendriks P1 Dongle
      firmware: <2026.1 # ESPHome firmware version, ESPHome 2026.1+ addresses sensors by entity name. The legacy /sensor/<object_id> URLs are deprecated and will be removed in ESPHome 2026.7.0. Choose '>=2026.1' if your device runs ESPHome 2026.1 or newer. [<2026.1, >=2026.1] (optional)
params:
  - name: host
    example: 192.0.2.2
    default:
    choice: []
    unit:
    description: IP address or hostname
    help:
    advanced: false
    optional: false
  - name: scale
    example: 1 | 10 | 100 | 1000
    default: 1000
    choice: []
    unit:
    description: Scale factor
    help: Use scale of 1000 for Zuidwijk Slimmelezer. Use scale 1 for ESPHome DSMR and mhendriks P1 Dongle
    advanced: false
    optional: false
  - name: firmware
    example:
    default: <2026.1
    choice: ['<2026.1', '>=2026.1']
    unit:
    description: ESPHome firmware version
    help: ESPHome 2026.1+ addresses sensors by entity name. The legacy /sensor/<object_id> URLs are deprecated and will be removed in ESPHome 2026.7.0. Choose '>=2026.1' if your device runs ESPHome 2026.1 or newer.
    advanced: false
    optional: true