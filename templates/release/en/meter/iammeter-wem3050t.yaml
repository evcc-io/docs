template: iammeter-3p
product:
  identifier: iammeter-wem3050t
  brand: IAMMETER
  description: WEM3050T
description: |
  Net Metering Mode (NEM) must be enabled.
  See https://www.iammeter.com/newsshow/net-energy-metering

render:
  - usage: grid
    default: |
      type: template
      template: iammeter-3p
      usage: grid
      host: 192.0.2.2 # IP address or hostname
    advanced: |
      type: template
      template: iammeter-3p
      usage: grid
      host: 192.0.2.2 # IP address or hostname
      cache: 2s # Cache, Time interval for data refresh (optional)
  - usage: pv
    default: |
      type: template
      template: iammeter-3p
      usage: pv
      host: 192.0.2.2 # IP address or hostname
    advanced: |
      type: template
      template: iammeter-3p
      usage: pv
      host: 192.0.2.2 # IP address or hostname
      cache: 2s # Cache, Time interval for data refresh (optional)
  - usage: charge
    default: |
      type: template
      template: iammeter-3p
      usage: charge
      host: 192.0.2.2 # IP address or hostname
    advanced: |
      type: template
      template: iammeter-3p
      usage: charge
      host: 192.0.2.2 # IP address or hostname
      cache: 2s # Cache, Time interval for data refresh (optional)
params:
  - name: host
    example: 192.0.2.2
    default:
    choice: []
    unit:
    description: IP address or hostname
    help:
    advanced: false
    optional: false
  - name: cache
    example: 5m
    default: 2s
    choice: []
    unit:
    description: Cache
    help: Time interval for data refresh
    advanced: true
    optional: true